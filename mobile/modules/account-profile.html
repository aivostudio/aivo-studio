<section class="mobile-account-profile-page" id="mobileAccountProfilePage">
  <button class="mobile-account-back" type="button" data-mobile-account-back>
    ← Hesabım
  </button>

  <div class="mobile-profile-head">
    <div class="mobile-profile-avatar" data-mobile-profile-initial>
      H
    </div>

    <div class="mobile-profile-head-text">
      <div class="mobile-profile-name" data-mobile-profile-name>
        Harun Bey
      </div>

      <div class="mobile-profile-mail" data-mobile-profile-email>
        harunerkezen@gmail.com
      </div>
    </div>
  </div>

  <div class="mobile-profile-card">
    <div class="mobile-profile-card-title">
      Profil Bilgileri
    </div>

    <div class="mobile-profile-card-sub">
      Kişisel hesap bilgilerin
    </div>

    <div class="mobile-profile-form">
      <div class="mobile-profile-field">
        <label>Ad</label>
        <input type="text" placeholder="Adın" data-mobile-profile-name-input>
      </div>

      <div class="mobile-profile-field">
        <label>Soyad</label>
        <input type="text" placeholder="Soyadın" data-mobile-profile-surname-input>
      </div>

      <div class="mobile-profile-field">
        <label>E-posta</label>
        <input type="email" readonly aria-readonly="true" data-mobile-profile-email-input>
        <small>Güvenlik nedeniyle e-posta adresi değiştirilemez.</small>
      </div>

        <button class="mobile-profile-save" type="button" data-mobile-profile-save>
        Profili Güncelle
      </button>
    </div>
  </div>

  <div class="mobile-profile-card">
    <div class="mobile-profile-card-title">
      Güvenlik
    </div>

    <div class="mobile-profile-card-sub">
      Şifre ve hesap güvenliği
    </div>

    <div class="mobile-profile-security-text">
      Hesabını güvende tutmak için şifreni düzenli aralıklarla güncelle.
    </div>

    <button class="mobile-profile-secondary-btn" type="button" data-mobile-password-open>
      Şifre Değiştir
    </button>
  </div>
  <div class="mobile-password-modal" data-mobile-password-modal hidden>
  <div class="mobile-password-backdrop" data-mobile-password-close></div>

  <div class="mobile-password-sheet">
    <div class="mobile-password-head">
      <div>
        <div class="mobile-password-title">Şifre Değiştir</div>
        <div class="mobile-password-sub">
          Hesabını güvende tutmak için güçlü bir şifre kullan.
        </div>
      </div>

      <button class="mobile-password-x" type="button" data-mobile-password-close>
        ×
      </button>
    </div>

    <div class="mobile-password-form">
      <div class="mobile-profile-field">
        <label>Mevcut Şifre</label>
        <input type="password" autocomplete="current-password" placeholder="Mevcut şifren" data-mobile-password-current>
      </div>

      <div class="mobile-profile-field">
        <label>Yeni Şifre</label>
        <input type="password" autocomplete="new-password" placeholder="Yeni şifre" data-mobile-password-new>
      </div>

      <div class="mobile-profile-field">
        <label>Yeni Şifre Tekrar</label>
        <input type="password" autocomplete="new-password" placeholder="Yeni şifre tekrar" data-mobile-password-new2>
      </div>

      <button class="mobile-profile-save" type="button" data-mobile-password-submit>
        Şifreyi Güncelle
      </button>
    </div>
  </div>
</div>
</section>
