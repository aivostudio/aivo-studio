<section id="mobileHomeSection">
  <section class="mobile-music-card">
    <div class="mobile-music-hero">
      <div class="mobile-music-kicker" data-i18n="home.eyebrow">AIVO Mobile Studio</div>
      <h3 data-i18n="music.title">AI Müzik Üret</h3>
      <p data-i18n="music.subtitle">Şarkı fikrini yaz, AIVO mobilde üretimi başlatsın.</p>
    </div>

    <input
      type="text"
      name="username"
      autocomplete="username"
      tabindex="-1"
      aria-hidden="true"
      style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;"
    >

    <input
      type="password"
      name="password"
      autocomplete="current-password"
      tabindex="-1"
      aria-hidden="true"
      style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;"
    >

    <label class="field-label" for="musicTitle" data-i18n="music.songTitle">Şarkı adı</label>
    <input
      id="musicTitle"
      name="aivo_mobile_song_title"
      class="field-input"
      type="text"
      autocomplete="off"
      autocapitalize="none"
      autocorrect="off"
      spellcheck="false"
      placeholder="Örn: Gece Yolu"
      data-i18n-placeholder="music.songTitlePlaceholder"
    >

    <label class="field-label" for="musicPrompt" data-i18n="music.prompt">Prompt</label>
    <textarea
      id="musicPrompt"
      class="field-textarea"
      placeholder="Ritim, mood, tür ve vokal detaylarını yaz..."
      data-i18n-placeholder="music.promptPlaceholder"
    ></textarea>

    <label class="field-label" for="musicLyrics">
      <span data-i18n="music.lyrics">Şarkı sözleri</span>
      <span class="optional" data-i18n="music.optional">(isteğe bağlı)</span>
    </label>
    <textarea
      id="musicLyrics"
      class="field-textarea lyrics"
      placeholder="Şarkı sözlerini buraya yaz..."
      data-i18n-placeholder="music.lyricsPlaceholder"
    ></textarea>

    <div class="mobile-music-select-row">
      <div class="mobile-music-select-field">
        <label class="field-label" for="mobileMusicMood" data-i18n="music.moodGenre">Mood / Tür</label>
        <select
          id="mobileMusicMood"
          name="mobile_track_style_select"
          class="field-input"
          autocomplete="off"
        >
                <option value="" data-i18n="music.selectMood">Mood / tür seç</option>
          <option value="pop, enerjik, modern vokal" data-i18n="music.moodPop">Pop</option>
          <option value="türkçe pop, enerjik, Türkçe vokal" data-i18n="music.moodTurkishPop">Türkçe Pop</option>
          <option value="rap, trap, güçlü beat" data-i18n="music.moodRap">Rap / Trap</option>
          <option value="drill, sert beat, karanlık atmosfer" data-i18n="music.moodDrill">Drill</option>
          <option value="arabesk, duygusal, Türkçe vokal" data-i18n="music.moodArabesk">Arabesk / Duygusal</option>
          <option value="slow, romantik, yumuşak vokal" data-i18n="music.moodSlow">Slow / Romantik</option>
          <option value="rock, gitar, güçlü vokal" data-i18n="music.moodRock">Rock</option>
          <option value="metal, sert gitar, güçlü davul" data-i18n="music.moodMetal">Metal</option>
          <option value="indie, alternatif, sıcak vokal" data-i18n="music.moodIndie">Indie / Alternatif</option>
          <option value="elektronik, dans, club" data-i18n="music.moodElectronic">Elektronik / Dans</option>
          <option value="edm, festival, yüksek enerji" data-i18n="music.moodEdm">EDM</option>
          <option value="house, club, ritmik groove" data-i18n="music.moodHouse">House</option>
          <option value="techno, karanlık, güçlü ritim" data-i18n="music.moodTechno">Techno</option>
          <option value="lo-fi, chill, yumuşak beat" data-i18n="music.moodLofi">Lo-fi / Chill</option>
          <option value="jazz, swing, canlı enstrümanlar" data-i18n="music.moodJazz">Jazz</option>
          <option value="blues, gitar, duygusal vokal" data-i18n="music.moodBlues">Blues</option>
          <option value="soul, rnb, sıcak vokal" data-i18n="music.moodSoulRnb">Soul / R&B</option>
          <option value="funk, groove, bass odaklı" data-i18n="music.moodFunk">Funk</option>
          <option value="reggae, rahat ritim, tropikal his" data-i18n="music.moodReggae">Reggae</option>
          <option value="afrobeat, ritmik, enerjik" data-i18n="music.moodAfrobeat">Afrobeat</option>
          <option value="latin pop, sıcak, dans ritmi" data-i18n="music.moodLatinPop">Latin Pop</option>
          <option value="tango, dramatik, akordeon, romantik" data-i18n="music.moodTango">Tango</option>
          <option value="flamenco, gitar, tutkulu ritim" data-i18n="music.moodFlamenco">Flamenco</option>
          <option value="klasik, orkestra, zarif kompozisyon" data-i18n="music.moodClassical">Klasik</option>
          <option value="cinematic, film müziği, epik orkestra" data-i18n="music.moodCinematic">Film Müziği / Cinematic</option>
          <option value="ambient, atmosferik, sakin doku" data-i18n="music.moodAmbient">Ambient</option>
          <option value="meditation, huzurlu, rahatlatıcı" data-i18n="music.moodMeditation">Meditation</option>
          <option value="country, akustik gitar, sıcak vokal" data-i18n="music.moodCountry">Country</option>
          <option value="folk, akustik, doğal vokal" data-i18n="music.moodFolk">Folk / Akustik</option>
          <option value="k-pop, parlak pop, modern prodüksiyon" data-i18n="music.moodKpop">K-Pop</option>
          <option value="j-pop, anime enerjisi, parlak melodi" data-i18n="music.moodJpop">J-Pop / Anime</option>
          <option value="phonk, drift, karanlık bass" data-i18n="music.moodPhonk">Phonk</option>
          <option value="synthwave, retro 80s, neon atmosfer" data-i18n="music.moodSynthwave">Synthwave / Retro 80s</option>
          <option value="tiktok viral, kısa hook, akılda kalıcı" data-i18n="music.moodTiktok">TikTok Viral</option>
          <option value="gym, motivasyon, güçlü beat" data-i18n="music.moodGym">Spor / Gym</option>
        </select>
      </div>

      <div class="mobile-music-select-field">
        <label class="field-label" for="mobileMusicVocal" data-i18n="music.vocalType">Vokal Tipi</label>
        <select
          id="mobileMusicVocal"
          name="mobile_vocal_type_select"
          class="field-input"
          autocomplete="off"
        >
          <option value="" data-i18n="music.selectVocal">Vokal tipini seç</option>
          <option value="Erkek Vokal (AI)" data-i18n="music.vocalMale">Erkek Vokal (AI)</option>
          <option value="Kadın Vokal (AI)" data-i18n="music.vocalFemale">Kadın Vokal (AI)</option>
          <option value="Enstrümantal (Vokalsiz)" data-i18n="music.vocalInstrumental">Enstrümantal (Vokalsiz)</option>
        </select>
      </div>
    </div>

    <button id="mobileMusicGenerateBtn" class="generate-btn" type="button" data-i18n="music.generate">
      ♪ Müzik Üret (2 Kredi)
    </button>

    <div id="mobileMusicStatus" class="mobile-status"></div>
  </section>

  <div id="mobileMusicResults" hidden></div>
</section>

<section id="mobileProductionsSection" hidden>
  <h2 class="section-title" data-i18n="music.libraryTitle">Müzik Kütüphanem</h2>

  <div id="mobileMusicLibrary" class="mobile-library-list">
    <div class="empty-card" data-i18n="music.libraryLoading">
      Kütüphane yükleniyor...
    </div>
  </div>
</section>

<div id="rightPanelHost" class="aivo-player-list" hidden></div>

<div id="mobileMiniPlayer" class="mobile-mini-player" hidden>
  <div class="mini-progress">
    <div id="miniProgressFill" class="mini-progress-fill"></div>
  </div>

  <div class="mini-inner">
    <div class="mini-cover">♪</div>

    <div class="mini-meta">
      <div id="miniTitle" class="mini-title" data-i18n="music.noMusicSelected">Müzik seçilmedi</div>
      <div id="miniSub" class="mini-sub">AIVO</div>
    </div>

    <button id="miniPlayBtn" class="mini-btn" type="button" data-i18n-label="music.play">▶</button>
  </div>

  <audio id="mobileMiniAudio" preload="metadata"></audio>
</div>
