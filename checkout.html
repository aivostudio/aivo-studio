<script>
(function () {
  "use strict";

  /* ================= UI HELPERS ================= */

  function setNote(msg) {
    const el = document.getElementById("checkoutNote");
    if (!el) return;
    el.hidden = false;
    el.textContent = msg;
  }

  function parseAmount(x) {
    const s = String(x || "").replace(/[^\d.,]/g, "").replace(",", ".");
    const n = Number(s);
    return Number.isFinite(n) ? n : 0;
  }

  function safeGetSelectedPack() {
    try {
      if (window.AIVO_STORE_V1 && typeof window.AIVO_STORE_V1.getSelectedPack === "function") {
        const p = window.AIVO_STORE_V1.getSelectedPack();
        return p ? String(p) : "";
      }
    } catch (e) {}
    return "";
  }

  function resolvePayTREnabledFlag() {
    let enabled = false;
    try {
      const url = new URL(window.location.href);

      // query override (?paytr=1 | ?paytr=0)
      if (url.searchParams.has("paytr")) {
        const q = url.searchParams.get("paytr");
        if (q === "1") localStorage.setItem("AIVO_PAYTR_ENABLED", "1");
        if (q === "0") localStorage.setItem("AIVO_PAYTR_ENABLED", "0");

        url.searchParams.delete("paytr");
        history.replaceState({}, "", url.pathname);
      }

      enabled = localStorage.getItem("AIVO_PAYTR_ENABLED") === "1";
    } catch (e) {}

    console.log("[PayTR][FLAG]", enabled ? "ENABLED" : "DISABLED");
    return enabled;
  }

  /* ================= DISPLAY ================= */

  const params = new URLSearchParams(location.search);
  const storePack = safeGetSelectedPack();

  const urlPlan  = (params.get("plan") || "").trim();
  const urlPrice = parseAmount(params.get("price"));

  const planEl  = document.getElementById("checkoutPlan");
  const priceEl = document.getElementById("checkoutPrice");

  const displayPrice = storePack ? parseAmount(storePack) : urlPrice;
  const displayPlan  = urlPlan || "Paket";

  if (planEl)  planEl.textContent  = displayPlan;
  if (priceEl) priceEl.textContent = displayPrice ? `${displayPrice} ₺` : "—";

  const backBtn = document.querySelector("[data-checkout-back]");
  if (backBtn) backBtn.onclick = () => history.back();

  /* ================= CHECKOUT BUTTON ================= */

  const payBtn = document.getElementById("payBtn");
  if (!payBtn) return;

  let paying = false;
  if (payBtn.dataset.bound === "1") return;
  payBtn.dataset.bound = "1";

  payBtn.addEventListener("click", async function () {
    if (paying) return;
    paying = true;

    payBtn.disabled = true;
    payBtn.textContent = "Ödeme hazırlanıyor…";
    setNote("Ödeme hazırlanıyor…");

    try {
      const PAYTR_ENABLED = resolvePayTREnabledFlag();
      const amount = displayPrice;

      // Store varsa pack oradan, yoksa amount’tan türet
      let pack = (storePack || "").trim();
      if (!pack) pack = String(Math.round(amount || 0));

      // Allowed liste
      const ALLOWED = ["199","399","899","2999"];
      if (!ALLOWED.includes(pack)) {
        throw new Error("INVALID_PACK:" + pack + " amount=" + amount);
      }

      /* ================= PAYMENT INIT ================= */

      console.log("[Checkout] paytr pack =", pack);
      setNote("Ödeme bağlantısı hazırlanıyor…");

      // Eski stripe pending bilgisini temizle
      try { localStorage.removeItem("aivo_pending_stripe_session"); } catch (e) {}

      const meRes = await fetch("/api/auth/me", {
        method: "GET",
        headers: { "Content-Type": "application/json" }
      });

      const meRaw = await meRes.text();
      let meData = null;
      try { meData = JSON.parse(meRaw); } catch (_) {}

      if (!meRes.ok || !meData || !meData.user) {
        throw new Error("AUTH_ME_FAILED");
      }

      const user = meData.user || {};
      const userId =
        String(
          user.id ||
          user.user_id ||
          user.uid ||
          user.email ||
          ""
        ).trim();

      const email =
        String(
          user.email ||
          user.user_email ||
          ""
        ).trim();

      if (!userId || !email) {
        throw new Error("USER_ID_OR_EMAIL_MISSING");
      }

      const initRes = await fetch("/api/paytr/init", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id: userId,
          email: email,
          plan: pack,
          amount: Number(pack)
        })
      });

      const initRaw = await initRes.text();
      let initData = null;
      try { initData = JSON.parse(initRaw); } catch (_) {}

      if (!initRes.ok || !initData || !initData.form) {
        const errMsg =
          (initData && initData.error) ? initData.error :
          ("PAYTR_INIT_FAILED HTTP " + initRes.status + " RAW=" + initRaw.slice(0, 160));
        throw new Error(errMsg);
      }

      const form = initData.form;
      const oid = initData.oid || form.merchant_oid;
      if (!oid) {
        throw new Error("PAYTR_OID_MISSING");
      }

      try {
        localStorage.setItem("aivo_pending_paytr_oid", String(oid));
        console.log("[Checkout] pending paytr oid saved:", oid);
      } catch (e) {
        throw new Error("LOCALSTORAGE_WRITE_FAILED");
      }

      const paytrForm = document.createElement("form");
      paytrForm.method = "POST";
      paytrForm.action = "https://www.paytr.com/odeme";
      paytrForm.style.display = "none";

      Object.keys(form).forEach(function (key) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = form[key] == null ? "" : String(form[key]);
        paytrForm.appendChild(input);
      });

      document.body.appendChild(paytrForm);
      setNote("Ödeme sayfasına yönlendiriliyorsunuz…");
      paytrForm.submit();
      return;

    } catch (err) {
      console.error("[Checkout]", err);
      setNote("Checkout başarısız: " + (err && err.message ? err.message : "Bilinmeyen hata"));

      payBtn.disabled = false;
      payBtn.textContent = "Güvenli Ödeme";
      paying = false;
    }
  });
})();
</script>
