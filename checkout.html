<script>
(function () {
  "use strict";

  function setNote(msg) {
    const el = document.getElementById("checkoutNote");
    if (!el) return;
    el.hidden = false;
    el.textContent = msg;
  }

  function parseAmount(x) {
    const s = String(x || "").replace(/[^\d.,]/g, "").replace(",", ".");
    const n = Number(s);
    return Number.isFinite(n) ? n : 0;
  }

  function safeGetSelectedPack() {
    try {
      if (window.AIVO_STORE_V1 && typeof window.AIVO_STORE_V1.getSelectedPack === "function") {
        const p = window.AIVO_STORE_V1.getSelectedPack();
        return p ? String(p) : "";
      }
    } catch (e) {}
    return "";
  }

  const params = new URLSearchParams(location.search);
  const garantiState = (params.get("garanti") || "").trim();
  const garantiOid = (params.get("oid") || localStorage.getItem("aivo_pending_garanti_oid") || "").trim();

  if (garantiState === "ok" && garantiOid) {
    setNote("Ödeme doğrulanıyor…");

    fetch(`/api/garanti/verify?oid=${encodeURIComponent(garantiOid)}`, {
      method: "GET",
      headers: { "Content-Type": "application/json" }
    })
      .then(async function (r) {
        const raw = await r.text();
        let data = null;
        try { data = JSON.parse(raw); } catch (_) {}

        if (!r.ok || !data || !data.ok) {
          throw new Error((data && data.error) ? data.error : "GARANTI_VERIFY_FAILED");
        }

        if (data.status === "paid") {
          setNote("Ödeme başarılı. Krediniz hesabınıza tanımlanıyor…");
          try { localStorage.removeItem("aivo_pending_garanti_oid"); } catch (e) {}
          return;
        }

        throw new Error("PAYMENT_NOT_PAID");
      })
      .catch(function (err) {
        console.error("[Checkout][Garanti Verify]", err);
        setNote("Ödeme doğrulanamadı: " + (err && err.message ? err.message : "Bilinmeyen hata"));
      });
  }

  if (garantiState === "fail") {
    setNote("Ödeme tamamlanmadı veya iptal edildi.");
  }

  const storePack = safeGetSelectedPack();
  const urlPlan = (params.get("plan") || "").trim();
  const urlPrice = parseAmount(params.get("price"));

  const planEl = document.getElementById("checkoutPlan");
  const priceEl = document.getElementById("checkoutPrice");

  const displayPrice = storePack ? parseAmount(storePack) : urlPrice;
  const displayPlan = urlPlan || "Paket";

  if (planEl) planEl.textContent = displayPlan;
  if (priceEl) priceEl.textContent = displayPrice ? `${displayPrice} ₺` : "—";

  const backBtn = document.querySelector("[data-checkout-back]");
  if (backBtn) backBtn.onclick = function () { history.back(); };

  const payBtn = document.getElementById("payBtn");
  if (!payBtn) return;

  let paying = false;
  if (payBtn.dataset.bound === "1") return;
  payBtn.dataset.bound = "1";

  payBtn.addEventListener("click", async function () {
    if (paying) return;
    paying = true;

    payBtn.disabled = true;
    payBtn.textContent = "Ödeme hazırlanıyor…";
    setNote("Ödeme hazırlanıyor…");

    try {
      const amount = displayPrice;

      let pack = (storePack || "").trim();
      if (!pack) pack = String(Math.round(amount || 0));

      const ALLOWED = ["199", "699", "1299", "2999"];
      if (!ALLOWED.includes(pack)) {
        throw new Error("INVALID_PACK:" + pack + " amount=" + amount);
      }

      setNote("Garanti ödeme bağlantısı hazırlanıyor…");

      try { localStorage.removeItem("aivo_pending_stripe_session"); } catch (e) {}
      try { localStorage.removeItem("aivo_pending_paytr_oid"); } catch (e) {}

      const meRes = await fetch("/api/auth/me", {
        method: "GET",
        headers: { "Content-Type": "application/json" }
      });

      const meRaw = await meRes.text();
      let meData = null;
      try { meData = JSON.parse(meRaw); } catch (_) {}

      if (!meRes.ok || !meData || !meData.user) {
        throw new Error("AUTH_ME_FAILED");
      }

      const user = meData.user || {};
      const userId = String(
        user.id ||
        user.user_id ||
        user.uid ||
        user.email ||
        ""
      ).trim();

      const email = String(
        user.email ||
        user.user_email ||
        ""
      ).trim();

      if (!userId || !email) {
        throw new Error("USER_ID_OR_EMAIL_MISSING");
      }

      const initRes = await fetch("/api/garanti/init", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id: userId,
          email: email,
          plan: pack,
          amount: Number(pack)
        })
      });

      const initRaw = await initRes.text();
      let initData = null;
      try { initData = JSON.parse(initRaw); } catch (_) {}

      if (!initRes.ok || !initData || !initData.gateway || !initData.gateway.fields) {
        const errMsg =
          (initData && initData.error) ? initData.error :
          ("GARANTI_INIT_FAILED HTTP " + initRes.status + " RAW=" + initRaw.slice(0, 160));
        throw new Error(errMsg);
      }

      const gateway = initData.gateway;
      const fields = gateway.fields || {};
      const oid = initData.oid || fields.oid;

      if (!oid) {
        throw new Error("GARANTI_OID_MISSING");
      }

      try {
        localStorage.setItem("aivo_pending_garanti_oid", String(oid));
        console.log("[Checkout] pending garanti oid saved:", oid);
      } catch (e) {
        throw new Error("LOCALSTORAGE_WRITE_FAILED");
      }

      const garantiForm = document.createElement("form");
      garantiForm.method = String(gateway.method || "POST").toUpperCase();
      garantiForm.action = String(gateway.action || "/api/garanti/notify");
      garantiForm.style.display = "none";

      Object.keys(fields).forEach(function (key) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = fields[key] == null ? "" : String(fields[key]);
        garantiForm.appendChild(input);
      });

      document.body.appendChild(garantiForm);
      setNote("Garanti ödeme sayfasına yönlendiriliyorsunuz…");
      garantiForm.submit();
      return;
    } catch (err) {
      console.error("[Checkout][Garanti]", err);
      setNote("Checkout başarısız: " + (err && err.message ? err.message : "Bilinmeyen hata"));

      payBtn.disabled = false;
      payBtn.textContent = "Güvenli Ödeme";
      paying = false;
    }
  });
})();
</script>
