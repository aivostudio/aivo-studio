<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIVO Mobile Studio</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/player.css?v=1">
  <link rel="stylesheet" href="/mobile/css/mobile.music.css?v=1">
  <link rel="stylesheet" href="/mobile/css/mobile.cover.css?v=1">

  <style>
    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#070914;
      color:#fff;
    }

    body{
      background:
        radial-gradient(520px 360px at 20% 0%, rgba(139,92,246,.28), transparent 62%),
        radial-gradient(520px 360px at 90% 20%, rgba(56,189,248,.18), transparent 62%),
        radial-gradient(560px 420px at 50% 100%, rgba(236,72,153,.16), transparent 65%),
        #070914;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .mobile-shell{
      width:min(430px,100%);
      min-height:100vh;
      margin:0 auto;
      padding:12px 14px 92px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
      letter-spacing:-.04em;
      font-size:20px;
    }

    .logo img{
      width:74px;
      height:auto;
      display:block;
    }

    .credit-pill{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.14);
      color:rgba(255,255,255,.92);
      font-size:12px;
      font-weight:850;
      white-space:nowrap;
    }

    .hero{
      padding:12px 13px;
      border-radius:22px;
      background:
        linear-gradient(135deg, rgba(139,92,246,.22), rgba(56,189,248,.08)),
        rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 14px 38px rgba(0,0,0,.26);
      margin-bottom:12px;
    }

    .eyebrow{
      width:max-content;
      max-width:100%;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      color:rgba(255,255,255,.76);
      font-size:10px;
      font-weight:850;
      margin-bottom:8px;
    }

    h1{
      margin:0 0 6px;
      font-size:24px;
      line-height:1;
      letter-spacing:-.055em;
      font-weight:950;
    }

    .grad{
      background:linear-gradient(135deg,#38bdf8,#8b5cf6,#ec4899);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .sub{
      margin:0;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.35;
      font-weight:650;
    }

    .section-title{
      margin:18px 0 10px;
      font-size:18px;
      line-height:1.1;
      letter-spacing:-.035em;
    }

    .empty-card{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.66);
      font-size:12px;
      line-height:1.45;
      font-weight:650;
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:80;
      width:min(430px,100%);
      height:74px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:0;
      padding:7px 10px calc(7px + env(safe-area-inset-bottom));
      background:rgba(5,7,16,.94);
      border-top:1px solid rgba(139,92,246,.28);
      box-shadow:0 -16px 36px rgba(0,0,0,.32);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .bottom-nav a{
      min-height:54px;
      border-radius:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      background:transparent;
      color:rgba(255,255,255,.52);
      font-size:10px;
      font-weight:900;
    }

    .bottom-nav a span{
      width:31px;
      height:31px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      line-height:1;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .bottom-nav a b{
      font-size:10px;
      line-height:1;
    }

    .bottom-nav a.active{
      color:#fff;
    }

    .bottom-nav a.active span{
      background:linear-gradient(135deg,#8b5cf6,#ec4899);
      border-color:rgba(255,255,255,.18);
      box-shadow:0 0 22px rgba(139,92,246,.34);
    }
.mobile-tools-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding-bottom:14px;
}

.mobile-tool-card{
  position:relative;
  width:100%;
  min-height:82px;
  padding:14px 16px;
  border:1px solid rgba(255,255,255,.13);
  border-radius:26px;
  background:
    radial-gradient(180px 90px at 0% 0%, rgba(139,92,246,.22), transparent 62%),
    linear-gradient(135deg, rgba(255,255,255,.085), rgba(255,255,255,.035));
  color:#fff;
  display:flex;
  align-items:center;
  gap:14px;
  text-align:left;
  cursor:pointer;
  overflow:hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    0 18px 42px rgba(0,0,0,.24);
}

.mobile-tool-card::after{
  content:"›";
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  color:rgba(255,255,255,.42);
  font-size:30px;
  font-weight:400;
  line-height:1;
}

.mobile-tool-card span{
  width:48px;
  height:48px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.055));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    0 10px 24px rgba(0,0,0,.22);
  font-size:22px;
  flex:0 0 auto;
}

.mobile-tool-card b{
  max-width:250px;
  padding-right:22px;
  font-size:15px;
  line-height:1.15;
  font-weight:950;
  letter-spacing:-.025em;
}

.mobile-tool-card:active{
  transform:scale(.985);
}
.tool-icon{
  position:relative;
  width:54px;
  height:54px;
  border-radius:20px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 25% 18%, rgba(255,255,255,.20), transparent 34%),
    linear-gradient(135deg, rgba(139,92,246,.30), rgba(56,189,248,.10));
  border:1px solid rgba(255,255,255,.15);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.16),
    inset 0 -16px 30px rgba(0,0,0,.18),
    0 12px 26px rgba(0,0,0,.28);
  overflow:hidden;
}

.tool-icon::before,
.tool-icon::after{
  content:"";
  position:absolute;
  display:block;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

.tool-icon-music::before{
  width:27px;
  height:31px;
  border:3px solid #b76cff;
  border-left:0;
  border-bottom:0;
  border-radius:2px;
  transform:translate(2px,-2px) skewY(-8deg);
  filter:drop-shadow(0 0 10px rgba(183,108,255,.75));
}

.tool-icon-music::after{
  width:13px;
  height:13px;
  left:14px;
  bottom:13px;
  border-radius:999px;
  background:#d064ff;
  box-shadow:18px -3px 0 #68c8ff, 0 0 14px rgba(208,100,255,.8);
}

.tool-icon-cover::before{
  width:30px;
  height:23px;
  border:3px solid #ec7dff;
  border-radius:3px;
  background:
    linear-gradient(135deg, transparent 58%, #50d9ff 59% 66%, transparent 67%),
    linear-gradient(45deg, transparent 50%, #ec7dff 51% 58%, transparent 59%);
  box-shadow:0 0 14px rgba(236,125,255,.72);
}

.tool-icon-cover::after{
  width:10px;
  height:10px;
  right:12px;
  top:12px;
  background:#ff7cff;
  clip-path:polygon(50% 0%, 63% 35%, 100% 50%, 63% 65%, 50% 100%, 37% 65%, 0% 50%, 37% 35%);
  filter:drop-shadow(0 0 8px rgba(255,124,255,.9));
}

.tool-icon-atmo::before{
  width:32px;
  height:20px;
  left:11px;
  top:17px;
  border:3px solid #6ee7ff;
  border-bottom:0;
  border-radius:18px 18px 7px 7px;
  box-shadow:0 0 14px rgba(110,231,255,.76);
}

.tool-icon-atmo::after{
  width:28px;
  height:12px;
  left:13px;
  bottom:12px;
  border-top:3px solid #60eaff;
  border-bottom:3px solid #60eaff;
  box-shadow:0 8px 0 -4px #60eaff, 0 0 12px rgba(96,234,255,.7);
}

.tool-icon-cartoon::before{
  width:27px;
  height:24px;
  border:3px solid #ff9878;
  border-radius:14px 14px 12px 12px;
  box-shadow:0 0 14px rgba(255,152,120,.72);
}

.tool-icon-cartoon::after{
  width:38px;
  height:30px;
  border-radius:999px;
  background:
    radial-gradient(circle at 9px 6px, transparent 0 5px, #ff9878 6px 8px, transparent 9px),
    radial-gradient(circle at 29px 6px, transparent 0 5px, #ff9878 6px 8px, transparent 9px),
    radial-gradient(circle at 16px 16px, #ff9878 0 2px, transparent 3px),
    radial-gradient(circle at 23px 16px, #ff9878 0 2px, transparent 3px),
    radial-gradient(circle at 19px 21px, transparent 0 3px, #ff9878 4px 5px, transparent 6px);
  filter:drop-shadow(0 0 10px rgba(255,152,120,.72));
}

.tool-icon-photofx::before{
  width:33px;
  height:33px;
  background:#ffd36a;
  clip-path:polygon(50% 0%, 60% 38%, 100% 50%, 60% 62%, 50% 100%, 40% 62%, 0% 50%, 40% 38%);
  filter:drop-shadow(0 0 13px rgba(255,211,106,.85));
}

.tool-icon-photofx::after{
  width:8px;
  height:8px;
  right:13px;
  top:12px;
  background:#ffe59a;
  clip-path:polygon(50% 0%, 60% 38%, 100% 50%, 60% 62%, 50% 100%, 40% 62%, 0% 50%, 40% 38%);
}

.tool-icon-video::before{
  width:31px;
  height:23px;
  border:3px solid #8d7cff;
  border-radius:4px;
  box-shadow:0 0 14px rgba(141,124,255,.76);
}

.tool-icon-video::after{
  width:0;
  height:0;
  border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  border-left:12px solid #69c8ff;
  transform:translateX(2px);
  filter:drop-shadow(0 0 8px rgba(105,200,255,.85));
}

.tool-icon-lipsync::before{
  width:25px;
  height:31px;
  left:13px;
  top:12px;
  border:3px solid #48e1ff;
  border-right:0;
  border-radius:18px 0 0 18px;
  box-shadow:0 0 14px rgba(72,225,255,.78);
}

.tool-icon-lipsync::after{
  width:14px;
  height:22px;
  right:12px;
  top:17px;
  border-right:3px solid #48e1ff;
  border-radius:50%;
  box-shadow:6px 0 0 -2px #48e1ff, 0 0 12px rgba(72,225,255,.75);
}
  </style>
</head>

<body>
  <main class="mobile-shell">
    <header class="topbar">
      <a class="logo" href="/index.mobile.html" aria-label="AIVO">
        <img src="/aivo-logo.png" alt="AIVO">
      </a>

      <a class="credit-pill" href="/fiyatlandirma.html#packs">Kredi Al</a>
    </header>

    <section class="hero">
      <div class="eyebrow">AIVO Mobile Studio</div>

      <h1>
        Cepte AI <span class="grad">üretim.</span>
      </h1>

      <p class="sub">
        Şarkı fikrini yaz, AIVO mobilde üretimi başlatsın.
      </p>
    </section>

    <div id="mobileMusicMount">
      <div class="empty-card">Müzik modülü yükleniyor...</div>
    </div>
    <div id="mobileCoverMount" hidden>
  <div class="empty-card">Kapak modülü yükleniyor...</div>
</div>
  <div id="mobileToolsMount" hidden>
  <h2 class="section-title">AI Araçlar</h2>

  <div class="mobile-tools-grid">
    <button class="mobile-tool-card" type="button" data-mobile-tool="music">
      <span class="tool-icon tool-icon-music" aria-hidden="true"></span>
      <b>AI Müzik Üret</b>
    </button>

    <button class="mobile-tool-card" type="button" data-mobile-tool="cover">
      <span class="tool-icon tool-icon-cover" aria-hidden="true"></span>
      <b>AI Kapak Üret</b>
    </button>

    <button class="mobile-tool-card" type="button" data-mobile-tool="atmo">
      <span class="tool-icon tool-icon-atmo" aria-hidden="true"></span>
      <b>AI Atmosfer Video</b>
    </button>

    <button class="mobile-tool-card" type="button" data-mobile-tool="cartoon">
      <span class="tool-icon tool-icon-cartoon" aria-hidden="true"></span>
      <b>AI Çocuk Çizgifilm</b>
    </button>

    <button class="mobile-tool-card" type="button" data-mobile-tool="photofx">
      <span class="tool-icon tool-icon-photofx" aria-hidden="true"></span>
      <b>AI Foto Efekt Video Clip</b>
    </button>

    <button class="mobile-tool-card" type="button" data-mobile-tool="video">
      <span class="tool-icon tool-icon-video" aria-hidden="true"></span>
      <b>AI Resimden Video Üret</b>
    </button>

    <button class="mobile-tool-card" type="button" data-mobile-tool="lipsync">
      <span class="tool-icon tool-icon-lipsync" aria-hidden="true"></span>
      <b>AI Dudak Senkron Video</b>
    </button>
  </div>
</div>
  </main>

  <nav class="bottom-nav">
    <a class="active" href="#home">
      <span>🏠</span>
      <b>Ana Sayfa</b>
    </a>
    <a href="#productions">
      <span>🎬</span>
      <b>Üretimler</b>
    </a>
    <a href="#tools">
      <span>✨</span>
      <b>Araçlar</b>
    </a>
    <a href="/fiyatlandirma.html#packs">
      <span>💳</span>
      <b>Krediler</b>
    </a>
  </nav>

<script>
  (async function(){
    const musicMount = document.getElementById("mobileMusicMount");
    if (!musicMount) return;

    let coverMount = document.getElementById("mobileCoverMount");
    let toolsMount = document.getElementById("mobileToolsMount");

    if (!coverMount) {
      coverMount = document.createElement("div");
      coverMount.id = "mobileCoverMount";
      coverMount.hidden = true;
      coverMount.innerHTML = '<div class="empty-card">Kapak modülü yükleniyor...</div>';
      musicMount.insertAdjacentElement("afterend", coverMount);
    }

    try {
      const musicRes = await fetch("/mobile/modules/mobile.music.html?v=1", {
        cache: "no-store"
      });

      if (!musicRes.ok) {
        throw new Error("mobile_music_html_load_failed");
      }

      musicMount.innerHTML = await musicRes.text();

      const musicScript = document.createElement("script");
      musicScript.src = "/mobile/js/mobile.music.js?v=1";
      musicScript.defer = true;
      document.body.appendChild(musicScript);
    } catch (err) {
      musicMount.innerHTML = '<div class="empty-card">Müzik modülü yüklenemedi.</div>';
    }

    try {
      const coverRes = await fetch("/mobile/modules/mobile.cover.html?v=1", {
        cache: "no-store"
      });

      if (!coverRes.ok) {
        throw new Error("mobile_cover_html_load_failed");
      }

      coverMount.innerHTML = await coverRes.text();

      const coverScript = document.createElement("script");
      coverScript.src = "/mobile/js/mobile.cover.js?v=1";
      coverScript.defer = true;
      document.body.appendChild(coverScript);
    } catch (err) {
      coverMount.innerHTML = '<div class="empty-card">Kapak modülü yüklenemedi.</div>';
    }

    const homeNav = document.querySelector('.bottom-nav a[href="#home"]');
    const productionsNav = document.querySelector('.bottom-nav a[href="#productions"]');
    const toolsNav = document.querySelector('.bottom-nav a[href="#tools"]');

    function setActiveNav(activeEl){
      document.querySelectorAll(".bottom-nav a").forEach(function(item){
        item.classList.toggle("active", item === activeEl);
      });
    }
function showMusic(){
  musicMount.hidden = false;
  coverMount.hidden = true;
  if (toolsMount) toolsMount.hidden = true;
}

  function showCover(){
  musicMount.hidden = true;
  coverMount.hidden = false;
  if (toolsMount) toolsMount.hidden = true;

  const heroSub = document.getElementById("mobileHeroSub");
  if (heroSub) {
    heroSub.textContent = "Kapak fikrini yaz, AIVO mobilde görselini üretsin.";
  }
}

    if (homeNav) {
      homeNav.addEventListener("click", function(){
        showMusic();
        setActiveNav(homeNav);
      });
    }

    let activeMobileModule = "music";

    function setCoverLibraryOnly(isLibraryOnly){
      const coverSection = document.getElementById("mobileCoverSection");
      if (!coverSection) return;

      const sectionTitles = coverSection.querySelectorAll(".section-title");
      const coverFormTitle = sectionTitles[0] || null;
      const coverLibraryTitle = sectionTitles[1] || null;
      const coverForm = coverSection.querySelector(".mobile-cover-card");
      const coverResults = coverSection.querySelector("#mobileCoverResults");

      if (coverFormTitle) coverFormTitle.hidden = !!isLibraryOnly;
      if (coverForm) coverForm.hidden = !!isLibraryOnly;

      if (coverLibraryTitle) coverLibraryTitle.hidden = !isLibraryOnly;
      if (coverResults) coverResults.hidden = !isLibraryOnly;
    }

    if (productionsNav) {
      productionsNav.addEventListener("click", function(e){
        if (activeMobileModule === "cover") {
          e.preventDefault();
          e.stopImmediatePropagation();

          showCover();
          setCoverLibraryOnly(true);
          setActiveNav(productionsNav);

          if (typeof window.mobileCoverHydrate === "function") {
            window.mobileCoverHydrate();
          }

          return;
        }

        showMusic();
        setActiveNav(productionsNav);
      }, true);
    }

   if (toolsNav) {
  toolsNav.addEventListener("click", function(e){
    e.preventDefault();

    musicMount.hidden = true;
    coverMount.hidden = true;
    if (toolsMount) toolsMount.hidden = false;

    setActiveNav(toolsNav);
  });
}
    document.querySelectorAll("[data-mobile-tool]").forEach(function(btn){
  btn.addEventListener("click", function(){
    const tool = btn.getAttribute("data-mobile-tool");

    if (tool === "music") {
      activeMobileModule = "music";
      musicMount.hidden = false;
      coverMount.hidden = true;
      if (toolsMount) toolsMount.hidden = true;
      setActiveNav(homeNav);
      return;
    }

    if (tool === "cover") {
      activeMobileModule = "cover";
      showCover();
      setCoverLibraryOnly(false);
      setActiveNav(toolsNav);

      if (typeof window.mobileCoverHydrate === "function") {
        window.mobileCoverHydrate();
      }
    }
  });
});
  })();
</script>
</body>
</html>
