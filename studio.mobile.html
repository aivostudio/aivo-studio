<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIVO Mobile Studio</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/player.css?v=1">

  <style>
    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#070914;
      color:#fff;
    }

    body{
      background:
        radial-gradient(520px 360px at 20% 0%, rgba(139,92,246,.28), transparent 62%),
        radial-gradient(520px 360px at 90% 20%, rgba(56,189,248,.18), transparent 62%),
        radial-gradient(560px 420px at 50% 100%, rgba(236,72,153,.16), transparent 65%),
        #070914;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }
    .mobile-shell{
      width:min(430px,100%);
      min-height:100vh;
      margin:0 auto;
      padding:12px 14px 92px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
      letter-spacing:-.04em;
      font-size:20px;
    }

    .logo img{
      width:74px;
      height:auto;
      display:block;
    }

    .credit-pill{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.14);
      color:rgba(255,255,255,.92);
      font-size:12px;
      font-weight:850;
      white-space:nowrap;
    }

     .hero{
      padding:12px 13px;
      border-radius:22px;
      background:
        linear-gradient(135deg, rgba(139,92,246,.22), rgba(56,189,248,.08)),
        rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 14px 38px rgba(0,0,0,.26);
      margin-bottom:12px;
    }

       .eyebrow{
      width:max-content;
      max-width:100%;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      color:rgba(255,255,255,.76);
      font-size:10px;
      font-weight:850;
      margin-bottom:8px;
    }
      h1{
      margin:0 0 6px;
      font-size:24px;
      line-height:1;
      letter-spacing:-.055em;
      font-weight:950;
    }

    .grad{
      background:linear-gradient(135deg,#38bdf8,#8b5cf6,#ec4899);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

      .sub{
      margin:0;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.35;
      font-weight:650;
    }

    .quick-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:18px;
    }

    .module-card{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px;
      border-radius:22px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.13);
      box-shadow:0 14px 34px rgba(0,0,0,.22);
    }

    .module-card:active{
      transform:scale(.985);
    }

    .ico{
      width:46px;
      height:46px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,rgba(139,92,246,.28),rgba(56,189,248,.18));
      border:1px solid rgba(255,255,255,.14);
      font-size:21px;
      flex:0 0 auto;
    }

    .module-card b{
      display:block;
      font-size:16px;
      margin-bottom:4px;
    }

    .module-card span{
      display:block;
      color:rgba(255,255,255,.64);
      font-size:13px;
      line-height:1.35;
      font-weight:650;
    }

    .section-title{
      margin:18px 0 10px;
      font-size:18px;
      line-height:1.1;
      letter-spacing:-.035em;
    }

    .empty-card{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.66);
      font-size:12px;
      line-height:1.45;
      font-weight:650;
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:80;
      width:min(430px,100%);
      height:74px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:0;
      padding:7px 10px calc(7px + env(safe-area-inset-bottom));
      background:rgba(5,7,16,.94);
      border-top:1px solid rgba(139,92,246,.28);
      box-shadow:0 -16px 36px rgba(0,0,0,.32);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .bottom-nav a{
      min-height:54px;
      border-radius:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      background:transparent;
      color:rgba(255,255,255,.52);
      font-size:10px;
      font-weight:900;
    }

    .bottom-nav a span{
      width:31px;
      height:31px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      line-height:1;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .bottom-nav a b{
      font-size:10px;
      line-height:1;
    }

    .bottom-nav a.active{
      color:#fff;
    }

    .bottom-nav a.active span{
      background:linear-gradient(135deg,#8b5cf6,#ec4899);
      border-color:rgba(255,255,255,.18);
      box-shadow:0 0 22px rgba(139,92,246,.34);
    }

    .mobile-music-card{
      padding:14px;
      border-radius:21px;
      background:rgba(255,255,255,.052);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 14px 36px rgba(0,0,0,.24);
    }

    .field-label{
      display:block;
      margin:11px 0 6px;
      color:rgba(255,255,255,.78);
      font-size:12px;
      font-weight:850;
    }

    .field-label:first-child{
      margin-top:0;
    }

    .field-input,
    .field-textarea{
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      border-radius:15px;
      background:rgba(7,9,20,.78);
      color:#fff;
      outline:none;
      padding:12px;
      font:700 13px/1.35 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .field-textarea{
      min-height:92px;
      resize:none;
    }

    .field-input::placeholder,
    .field-textarea::placeholder{
      color:rgba(255,255,255,.42);
    }

    .generate-btn{
      width:100%;
      min-height:50px;
      margin-top:14px;
      border:0;
      border-radius:16px;
      background:linear-gradient(135deg,#8b5cf6,#ec4899);
      color:#fff;
      font-size:14px;
      font-weight:950;
      cursor:pointer;
      box-shadow:0 15px 34px rgba(139,92,246,.28);
    }

    .generate-btn:disabled{
      opacity:.62;
      cursor:not-allowed;
    }

    .mobile-status{
      min-height:18px;
      margin-top:10px;
      color:rgba(255,255,255,.68);
      font-size:12px;
      font-weight:750;
      line-height:1.35;
    }
        #mobileMusicResults.aivo-player-card{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.065);
      border:1px solid rgba(255,255,255,.13);
      box-shadow:0 14px 34px rgba(0,0,0,.22);
      color:#fff;
    }

    #mobileMusicResults .aivo-player-left{
      width:44px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#8b5cf6,#6366f1);
      flex:0 0 auto;
    }

    #mobileMusicResults .aivo-player-spinner{
      width:18px;
      height:18px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.35);
      border-top-color:#fff;
      animation:aivoSpin .85s linear infinite;
    }

    @keyframes aivoSpin{
      to{transform:rotate(360deg)}
    }

    #mobileMusicResults .aivo-player-mid{
      min-width:0;
      flex:1;
    }

    #mobileMusicResults .aivo-player-title{
      font-size:13px;
      font-weight:950;
      color:#fff;
      margin-bottom:5px;
    }
.mobile-library-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-bottom:120px;
}

.mobile-library-row{
  display:grid;
  grid-template-columns:54px minmax(0,1fr) 38px;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:18px;
  background:linear-gradient(
    135deg,
    rgba(255,255,255,.08),
    rgba(255,255,255,.04)
  );
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 10px 28px rgba(0,0,0,.22);
}

.mobile-library-thumb{
  width:54px;
  height:54px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  color:#fff;
  font-size:24px;
  font-weight:900;
}

.mobile-library-meta{
  min-width:0;
}

.mobile-library-title{
  color:#fff;
  font-size:14px;
  line-height:1.15;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.mobile-library-sub{
  margin-top:5px;
  color:rgba(255,255,255,.58);
  font-size:11px;
  font-weight:750;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.mobile-library-play{
  width:38px;
  height:38px;
  border:0;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  color:#fff;
  font-size:16px;
  font-weight:900;
}
    .mobile-library-row.is-playing{
  border-color:rgba(236,72,153,.45);
  box-shadow:
    0 0 0 1px rgba(236,72,153,.18),
    0 0 28px rgba(168,85,247,.22);
}

.mobile-library-row.is-playing .mobile-library-thumb{
  animation:mobilePulseBeat 1.1s ease-in-out infinite;
}

.mobile-library-row.is-playing .mobile-library-play{
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
}

@keyframes mobilePulseBeat{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
#mobileMusicResults{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-bottom:76px;
}

#mobileMusicResults .aivo-player-card{
  width:100%;
  display:grid;
  grid-template-columns:46px minmax(0,1fr) auto;
  align-items:center;
  gap:12px;
}

    #mobileMusicResults .aivo-player-sub{
      margin-top:6px;
      color:rgba(255,255,255,.55);
      font-size:11px;
      font-weight:750;
    }

    #mobileMusicResults .aivo-player-actions{
      flex:0 0 auto;
    }

    #mobileMusicResults .aivo-action{
      min-width:34px;
      height:34px;
      border:1px solid rgba(239,68,68,.28);
      border-radius:12px;
      background:rgba(239,68,68,.14);
      color:#fff;
      font-size:11px;
      font-weight:900;
    }
    .mobile-mini-player{
  position:fixed;
  left:50%;
  bottom:74px;
  z-index:90;
  width:min(430px,100%);
  transform:translateX(-50%);
  background:rgba(18,18,26,.88);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 -12px 34px rgba(0,0,0,.34);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  overflow:hidden;
}

.mobile-mini-player .mini-progress{
  width:100%;
  height:3px;
  background:rgba(255,255,255,.18);
}

.mobile-mini-player .mini-progress-fill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
}

.mobile-mini-player .mini-inner{
  height:64px;
  display:grid;
  grid-template-columns:46px 1fr 44px;
  align-items:center;
  gap:10px;
  padding:8px 12px;
}

.mobile-mini-player .mini-cover{
  width:46px;
  height:46px;
  border-radius:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  color:#fff;
  font-size:22px;
  font-weight:950;
}

.mobile-mini-player .mini-meta{
  min-width:0;
}

.mobile-mini-player .mini-title{
  color:#fff;
  font-size:13px;
  line-height:1.15;
  font-weight:950;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.mobile-mini-player .mini-sub{
  margin-top:3px;
  color:rgba(255,255,255,.68);
  font-size:11px;
  line-height:1.1;
  font-weight:750;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.mobile-mini-player .mini-btn{
  width:40px;
  height:40px;
  border:0;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  color:#fff;
  font-size:18px;
  font-weight:950;
}
  </style>
</head>

<body>
  <main class="mobile-shell">
    <header class="topbar">
      <a class="logo" href="/index.mobile.html" aria-label="AIVO">
        <img src="/aivo-logo.png" alt="AIVO">
      </a>

      <a class="credit-pill" href="/fiyatlandirma.html#packs">Kredi Al</a>
    </header>

       <section class="hero">
      <div class="eyebrow">AIVO Mobile Studio</div>

      <h1>
        Cepte AI <span class="grad">üretim.</span>
      </h1>

      <p class="sub">
        Şarkı fikrini yaz, AIVO mobilde üretimi başlatsın.
      </p>
    </section>
<section id="mobileHomeSection">
<h2 class="section-title">AI Müzik Üret</h2>

<section class="mobile-music-card">
  <label class="field-label" for="musicTitle">Şarkı adı</label>
  <input id="musicTitle" class="field-input" type="text" placeholder="Örn: Gece Yolu">

  <label class="field-label" for="musicPrompt">Prompt</label>
  <textarea id="musicPrompt" class="field-textarea" placeholder="Ritim, mood, tür ve vokal detaylarını yaz..."></textarea>

 <label class="field-label" for="musicLyrics">Şarkı sözleri <span class="optional">(isteğe bağlı)</span></label>
<textarea id="musicLyrics" class="field-textarea lyrics" placeholder="Şarkı sözlerini buraya yaz..."></textarea>

<label class="field-label" for="musicMood">Mood / Tür</label>
<input id="musicMood" class="field-input" type="text" placeholder="Örn: pop, enerjik, Türkçe vokal">

  <button id="mobileMusicGenerateBtn" class="generate-btn" type="button">
    Müzik Üret
  </button>

  <div id="mobileMusicStatus" class="mobile-status"></div>
</section>

  <h2 class="section-title">Son müzikler</h2>

  <div id="mobileMusicResults" class="empty-card">
    Henüz mobil müzik üretimi başlatılmadı.
  </div>
</section>

<section id="mobileProductionsSection" hidden>
  <h2 class="section-title">Müzik Kütüphanem</h2>

  <div id="mobileMusicLibrary" class="mobile-library-list">
    <div class="empty-card">
      Kütüphane yükleniyor...
    </div>
  </div>
</section>

<div id="rightPanelHost" class="aivo-player-list" hidden></div>

<div id="mobileMiniPlayer" class="mobile-mini-player" hidden>
  <div class="mini-progress">
    <div id="miniProgressFill" class="mini-progress-fill"></div>
  </div>

  <div class="mini-inner">
    <div class="mini-cover">♪</div>

    <div class="mini-meta">
      <div id="miniTitle" class="mini-title">Müzik seçilmedi</div>
      <div id="miniSub" class="mini-sub">AIVO</div>
    </div>

    <button id="miniPlayBtn" class="mini-btn" type="button">▶</button>
  </div>

  <audio id="mobileMiniAudio" preload="metadata"></audio>
</div>

  </main>

<nav class="bottom-nav">
  <a class="active" href="#home">
    <span>🏠</span>
    <b>Ana Sayfa</b>
  </a>
  <a href="#productions">
    <span>🎬</span>
    <b>Üretimler</b>
  </a>
  <a href="#tools">
    <span>✨</span>
    <b>Araçlar</b>
  </a>
  <a href="/fiyatlandirma.html#packs">
    <span>💳</span>
    <b>Krediler</b>
  </a>
</nav>
<script>
  (function(){
    const btn = document.getElementById("mobileMusicGenerateBtn");
    const titleEl = document.getElementById("musicTitle");
    const promptEl = document.getElementById("musicPrompt");
    const moodEl = document.getElementById("musicMood");
    const lyricsEl = document.getElementById("musicLyrics");
    const statusEl = document.getElementById("mobileMusicStatus");
    const resultsEl = document.getElementById("mobileMusicResults");
    const homeSectionEl = document.getElementById("mobileHomeSection");
    const productionsSectionEl = document.getElementById("mobileProductionsSection");
    const mobileMusicLibraryEl = document.getElementById("mobileMusicLibrary");
    const productionsNavEl = document.querySelector('.bottom-nav a[href="#productions"]');
    const homeNavEl = document.querySelector('.bottom-nav a[href="#home"]');
    const miniPlayerEl = document.getElementById("mobileMiniPlayer");
    const miniAudioEl = document.getElementById("mobileMiniAudio");
    const miniPlayBtn = document.getElementById("miniPlayBtn");
    const miniTitleEl = document.getElementById("miniTitle");
    const miniSubEl = document.getElementById("miniSub");
    const miniProgressFill = document.getElementById("miniProgressFill");
if (!btn || !promptEl || !statusEl || !resultsEl || !homeSectionEl || !productionsSectionEl || !productionsNavEl || !homeNavEl || !miniPlayerEl || !miniAudioEl || !miniPlayBtn || !miniTitleEl || !miniSubEl || !miniProgressFill) return;
     function showMobileSection(name){
  const isProductions = name === "productions";

  homeSectionEl.hidden = isProductions;
  productionsSectionEl.hidden = !isProductions;

  homeNavEl.classList.toggle("active", !isProductions);
  productionsNavEl.classList.toggle("active", isProductions);
}

homeNavEl.addEventListener("click", function(e){
  e.preventDefault();
  showMobileSection("home");
});

productionsNavEl.addEventListener("click", function(e){
  e.preventDefault();
  showMobileSection("productions");
    hydrateMusicLibrary();
});
    async function hydrateMusicLibrary(){
  if (!mobileMusicLibraryEl) return;

  mobileMusicLibraryEl.innerHTML = `
    <div class="empty-card">
      Kütüphane yükleniyor...
    </div>
  `;

  try {
    const res = await fetch("/api/jobs/list?app=music", {
      headers:{
        "accept":"application/json"
      },
      cache:"no-store"
    });

    const data = await res.json();

    const rows = Array.isArray(data?.items)
  ? data.items
  : Array.isArray(data?.jobs)
    ? data.jobs
    : Array.isArray(data)
      ? data
      : [];
    if (!rows.length) {
      mobileMusicLibraryEl.innerHTML = `
        <div class="empty-card">
          Henüz müzik bulunamadı.
        </div>
      `;
      return;
    }

    mobileMusicLibraryEl.innerHTML = "";

    rows.reverse().forEach(function(row){
      const title =
        row.title ||
        row.prompt ||
        "Yeni müzik";

     const outputs = Array.isArray(row.outputs) ? row.outputs : [];

const firstAudioOutput = outputs.find(function(output){
  return output && (
    output.audio_url ||
    output.url ||
    output.archive_url ||
    output.raw_url ||
    output.src
  );
});

const audioUrl =
  row.audio_url ||
  row.url ||
  row.output_url ||
  row.meta?.audio_url ||
  row.meta?.url ||
  row.meta?.final_audio_url ||
  firstAudioOutput?.audio_url ||
  firstAudioOutput?.url ||
  firstAudioOutput?.archive_url ||
  firstAudioOutput?.raw_url ||
  firstAudioOutput?.src ||
  "";
let resolvedAudioUrl = audioUrl;
let isReady = !!resolvedAudioUrl;

const item = document.createElement("div");
item.className = "mobile-library-row";

item.innerHTML = `
  <div class="mobile-library-thumb">♪</div>

  <div class="mobile-library-meta">
    <div class="mobile-library-title">
      ${safe(title)}
    </div>

    <div class="mobile-library-sub">
      ${isReady ? "Hazır" : "Hazırlanıyor"}
    </div>
  </div>

  <button class="mobile-library-play" type="button">
    ${isReady ? "▶" : "…"}
  </button>
`;

const subEl = item.querySelector(".mobile-library-sub");
const playEl = item.querySelector(".mobile-library-play");

function activateLibraryRow(nextAudioUrl){
  resolvedAudioUrl = String(nextAudioUrl || "");
  isReady = !!resolvedAudioUrl;

  if (subEl) subEl.textContent = isReady ? "Hazır" : "Hazırlanıyor";
  if (playEl) playEl.textContent = isReady ? "▶" : "…";
}

async function wakeLibraryRow(){
  if (isReady) return;

  const ids = Array.isArray(row.meta?.provider_song_ids)
    ? row.meta.provider_song_ids
    : [];

  const statusJobId =
    ids.length
      ? ids.join(",")
      : row.meta?.provider_job_id ||
        row.meta?.internal_job_id ||
        row.job_id ||
        "";

  if (!statusJobId) return;

  try {
    const res = await fetch("/api/music/status?job_id=" + encodeURIComponent(statusJobId), {
      headers: { "accept": "application/json" },
      cache: "no-store"
    });

    const data = await res.json();

    const statusOutputs = Array.isArray(data?.outputs) ? data.outputs : [];
    const firstAudio = statusOutputs.find(function(output){
      return output && (
        output.url ||
        output.audio_url ||
        output.archive_url ||
        output.raw_url ||
        output.src
      );
    });

    const nextAudioUrl =
      data?.audio?.src ||
      data?.audio?.url ||
      firstAudio?.url ||
      firstAudio?.audio_url ||
      firstAudio?.archive_url ||
      firstAudio?.raw_url ||
      firstAudio?.src ||
      "";

    if (nextAudioUrl) {
      activateLibraryRow(nextAudioUrl);
    }
  } catch (err) {}
}

    function safe(value){
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    function loadMiniPlayer(payload){
  const title = String(payload.title || "Yeni müzik");
  const sub = String(payload.sub || "AIVO");
  const audioUrl = String(payload.audioUrl || "");

  if (!audioUrl) return;

  miniPlayerEl.hidden = false;
  miniTitleEl.textContent = title;
  miniSubEl.textContent = sub;
  miniAudioEl.src = audioUrl;
  miniProgressFill.style.width = "0%";
  miniPlayBtn.textContent = "▶";

  miniAudioEl.play().then(function(){
    miniPlayBtn.textContent = "Ⅱ";
  }).catch(function(){
    miniPlayBtn.textContent = "▶";
  });
}

miniPlayBtn.addEventListener("click", function(){
  if (!miniAudioEl.src) return;

  if (miniAudioEl.paused) {
    miniAudioEl.play();
    miniPlayBtn.textContent = "Ⅱ";
  } else {
    miniAudioEl.pause();
    miniPlayBtn.textContent = "▶";
  }
});

miniAudioEl.addEventListener("timeupdate", function(){
  if (!miniAudioEl.duration || !Number.isFinite(miniAudioEl.duration)) return;

  const percent = Math.max(0, Math.min(100, (miniAudioEl.currentTime / miniAudioEl.duration) * 100));
  miniProgressFill.style.width = percent + "%";
});
    const miniProgressEl = miniPlayerEl.querySelector(".mini-progress");

if (miniProgressEl) {
  miniProgressEl.addEventListener("click", function(e){
    if (!miniAudioEl.duration || !Number.isFinite(miniAudioEl.duration)) return;

    const rect = miniProgressEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const percent = Math.max(0, Math.min(1, x / rect.width));

    miniAudioEl.currentTime = miniAudioEl.duration * percent;
  });
}

miniAudioEl.addEventListener("ended", function(){
  miniPlayBtn.textContent = "▶";
  miniProgressFill.style.width = "0%";
});

 const title = String(payload.title || "Yeni müzik")

  async function pollMobileMusicJob(jobId, title){
  let tries = 0;

  async function tick(){
    tries += 1;

    try {
      const res = await fetch("/api/music/status?job_id=" + encodeURIComponent(jobId), {
        headers: { "accept": "application/json" },
        cache: "no-store"
      });

      const data = await res.json();

      const outputs = Array.isArray(data && data.outputs)
        ? data.outputs.filter(function(output){
            return output && (output.url || output.audio_url);
          })
        : [];

      if ((data.state === "completed" || data.status === "completed") && outputs.length) {
        statusEl.textContent = "Müzik hazır, player kartlara çevriliyor...";

        resultsEl.hidden = false;
        resultsEl.className = "";
        resultsEl.innerHTML = "";

        outputs.forEach(function(output, index){
        const card = document.createElement("div");
        card.className = "aivo-player-card is-ready";
       card.style.marginBottom = index === outputs.length - 1 ? "0" : "6px";
       card.style.padding = "8px 0";
        card.style.minHeight = "58px";
       card.style.alignItems = "center";
          card.style.position = "relative";
       card.style.gridTemplateColumns = "46px minmax(0,1fr)";
      card.style.paddingRight = "78px";
     card.style.borderRadius = "18px";
     card.style.background = "linear-gradient(135deg, rgba(255,255,255,.075), rgba(255,255,255,.035))";
   card.style.border = "1px solid rgba(255,255,255,.10)";
      card.style.boxShadow = "none";

          const audioUrl = output.url || output.audio_url || "";
          const cardTitle = index === 0
            ? (title || "Yeni müzik")
            : (title || "Yeni müzik") + " · Versiyon " + (index + 1);

     card.innerHTML = `
  <div class="aivo-player-left">
    <button class="aivo-action" type="button" data-action="mobile-play" title="Oynat">▶</button>
  </div>

  <div class="aivo-player-mid">
    <div class="aivo-player-titleRow">
      <div class="aivo-player-title" style="font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${safe(cardTitle)}</div>
    </div>
    <div class="aivo-player-sub" style="font-size:11px;margin-top:2px;">Müzik hazır</div>
    <audio class="aivo-audio" preload="metadata" src="${safe(audioUrl)}"></audio>
  </div>

<div class="aivo-player-actions" style="position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:6px;">
   <a class="aivo-action" href="${safe(audioUrl)}" download title="İndir" style="min-width:30px;width:30px;height:30px;border-radius:10px;font-size:13px;border:1px solid rgba(168,85,247,.42);background:rgba(168,85,247,.16);box-shadow:0 0 18px rgba(168,85,247,.18);">↓</a>
<button class="aivo-action is-danger" type="button" data-action="mobile-remove" title="Sil" style="min-width:30px;width:30px;height:30px;border-radius:10px;font-size:14px;border:1px solid rgba(236,72,153,.55);background:rgba(236,72,153,.22);box-shadow:0 0 18px rgba(236,72,153,.22);">🗑</button>
  </div>
`;

       const playBtn = card.querySelector('[data-action="mobile-play"]');
const deleteBtn = card.querySelector('[data-action="mobile-remove"]');

if (playBtn) {
  playBtn.addEventListener("click", function(){
    loadMiniPlayer({
      title: cardTitle,
      sub: index === 0 ? "Orijinal" : "Versiyon " + (index + 1),
      audioUrl
    });
  });
}

          if (deleteBtn) {
            deleteBtn.addEventListener("click", function(){
              card.remove();

              if (!resultsEl.querySelector(".aivo-player-card")) {
                resultsEl.className = "empty-card";
                resultsEl.innerHTML = "Henüz mobil müzik üretimi başlatılmadı.";
                statusEl.textContent = "";
              }
            });
          }

          resultsEl.appendChild(card);
        });

        return;
      }
    } catch (err) {
      statusEl.textContent = "Polling hatası: " + String(err && err.message ? err.message : err);
      return;
    }

    if (tries < 40) {
      setTimeout(tick, 3000);
    }
  }

  tick();
}
    btn.addEventListener("click", async function(){
      const title = (titleEl.value || "").trim();
      const prompt = (promptEl.value || "").trim();
      const mood = (moodEl.value || "").trim();
      const lyrics = (lyricsEl.value || "").trim();

      if (!prompt) {
        statusEl.textContent = "Prompt yazmadan üretim başlatılamaz.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Üretiliyor...";
      statusEl.textContent = "Müzik üretimi başlatılıyor...";

      try {
        const res = await fetch("/api/music/generate", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "accept": "application/json"
          },
          body: JSON.stringify({
            title,
            prompt,
            mood,
            lyrics,
            vocal: "Vokalli",
            mode: "vocals"
          })
        });

        const data = await res.json();

        if (!data || data.ok === false) {
          statusEl.textContent = "Üretim başlatılamadı: " + (data && data.error ? data.error : "unknown_error");
          return;
        }

        const jobId = data.internal_job_id || data.db_job_id || data.provider_job_id || data.job_id || "job oluşturuldu";
        const pollJobId = data.provider_job_id || data.internal_job_id || data.db_job_id || data.job_id || jobId;

        statusEl.textContent = "Üretim kuyruğa alındı.";

        renderQueuedTrackCard({
          title: title || "Yeni müzik",
          jobId
        });
          pollMobileMusicJob(pollJobId, title || "Yeni müzik");
      } catch (err) {
        statusEl.textContent = "Bağlantı hatası: " + String(err && err.message ? err.message : err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Müzik Üret";
      }
    });
  })();
</script>
