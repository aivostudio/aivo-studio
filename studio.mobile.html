<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIVO Mobile Studio</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#070914;
      color:#fff;
    }

    body{
      background:
        radial-gradient(520px 360px at 20% 0%, rgba(139,92,246,.28), transparent 62%),
        radial-gradient(520px 360px at 90% 20%, rgba(56,189,248,.18), transparent 62%),
        radial-gradient(560px 420px at 50% 100%, rgba(236,72,153,.16), transparent 65%),
        #070914;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .mobile-shell{
      width:min(430px,100%);
      min-height:100vh;
      margin:0 auto;
      padding:18px 16px 96px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:22px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
      letter-spacing:-.04em;
      font-size:20px;
    }

    .logo img{
      width:82px;
      height:auto;
      display:block;
    }

    .credit-pill{
      min-height:36px;
      padding:0 13px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.14);
      color:rgba(255,255,255,.92);
      font-size:13px;
      font-weight:850;
      white-space:nowrap;
    }

    .hero{
      padding:18px;
      border-radius:28px;
      background:
        linear-gradient(135deg, rgba(139,92,246,.26), rgba(56,189,248,.10)),
        rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 24px 70px rgba(0,0,0,.35);
      margin-bottom:18px;
    }

    .eyebrow{
      width:max-content;
      max-width:100%;
      padding:8px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      color:rgba(255,255,255,.76);
      font-size:12px;
      font-weight:850;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 10px;
      font-size:34px;
      line-height:1;
      letter-spacing:-.055em;
      font-weight:950;
    }

    .grad{
      background:linear-gradient(135deg,#38bdf8,#8b5cf6,#ec4899);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .sub{
      margin:0;
      color:rgba(255,255,255,.72);
      font-size:15px;
      line-height:1.5;
      font-weight:650;
    }

    .quick-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:18px;
    }

    .module-card{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px;
      border-radius:22px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.13);
      box-shadow:0 14px 34px rgba(0,0,0,.22);
    }

    .module-card:active{
      transform:scale(.985);
    }

    .ico{
      width:46px;
      height:46px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,rgba(139,92,246,.28),rgba(56,189,248,.18));
      border:1px solid rgba(255,255,255,.14);
      font-size:21px;
      flex:0 0 auto;
    }

    .module-card b{
      display:block;
      font-size:16px;
      margin-bottom:4px;
    }

    .module-card span{
      display:block;
      color:rgba(255,255,255,.64);
      font-size:13px;
      line-height:1.35;
      font-weight:650;
    }

    .section-title{
      margin:24px 0 12px;
      font-size:20px;
      line-height:1.1;
      letter-spacing:-.035em;
    }

    .empty-card{
      padding:18px;
      border-radius:22px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.66);
      font-size:13px;
      line-height:1.5;
      font-weight:650;
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:80;
      width:min(430px,100%);
      height:78px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:0;
      padding:8px 10px calc(8px + env(safe-area-inset-bottom));
      background:rgba(5,7,16,.94);
      border-top:1px solid rgba(139,92,246,.28);
      box-shadow:0 -18px 42px rgba(0,0,0,.34);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .bottom-nav a{
      min-height:58px;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      background:transparent;
      color:rgba(255,255,255,.52);
      font-size:11px;
      font-weight:900;
    }

    .bottom-nav a span{
      width:34px;
      height:34px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      line-height:1;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .bottom-nav a b{
      font-size:11px;
      line-height:1;
    }

    .bottom-nav a.active{
      color:#fff;
    }

    .bottom-nav a.active span{
      background:linear-gradient(135deg,#8b5cf6,#ec4899);
      border-color:rgba(255,255,255,.18);
      box-shadow:0 0 24px rgba(139,92,246,.38);
    }
    .mobile-music-card{
  padding:18px;
  border-radius:24px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.13);
  box-shadow:0 18px 46px rgba(0,0,0,.28);
}

.field-label{
  display:block;
  margin:14px 0 7px;
  color:rgba(255,255,255,.78);
  font-size:13px;
  font-weight:850;
}

.field-label:first-child{
  margin-top:0;
}

.field-input,
.field-textarea{
  width:100%;
  border:1px solid rgba(255,255,255,.13);
  border-radius:16px;
  background:rgba(7,9,20,.78);
  color:#fff;
  outline:none;
  padding:14px;
  font:700 14px/1.4 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.field-textarea{
  min-height:118px;
  resize:none;
}

.field-input::placeholder,
.field-textarea::placeholder{
  color:rgba(255,255,255,.42);
}

.generate-btn{
  width:100%;
  min-height:54px;
  margin-top:16px;
  border:0;
  border-radius:17px;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  color:#fff;
  font-size:15px;
  font-weight:950;
  cursor:pointer;
  box-shadow:0 18px 42px rgba(139,92,246,.30);
}

.generate-btn:disabled{
  opacity:.62;
  cursor:not-allowed;
}

.mobile-status{
  min-height:20px;
  margin-top:12px;
  color:rgba(255,255,255,.68);
  font-size:13px;
  font-weight:750;
  line-height:1.4;
}
  </style>
</head>

<body>
  <main class="mobile-shell">
    <header class="topbar">
      <a class="logo" href="/index.mobile.html" aria-label="AIVO">
        <img src="/aivo-logo.png" alt="AIVO">
      </a>

      <a class="credit-pill" href="/fiyatlandirma.html#packs">Kredi Al</a>
    </header>

    <section class="hero">
      <div class="eyebrow">AIVO Mobile Studio</div>

      <h1>
        Hızlı üretime <span class="grad">başla.</span>
      </h1>

      <p class="sub">
       Telefonundan hızlıca şarkı fikri yaz, AIVO senin için müzik üretimini başlatsın.
      </p>
    </section>

<h2 class="section-title">AI Müzik Üret</h2>

<section class="mobile-music-card">
  <label class="field-label" for="musicTitle">Şarkı adı</label>
  <input id="musicTitle" class="field-input" type="text" placeholder="Örn: Gece Yolu">

  <label class="field-label" for="musicPrompt">Prompt</label>
  <textarea id="musicPrompt" class="field-textarea" placeholder="Ritim, mood, tür ve vokal detaylarını yaz..."></textarea>

 <label class="field-label" for="musicLyrics">Şarkı sözleri <span class="optional">(isteğe bağlı)</span></label>
<textarea id="musicLyrics" class="field-textarea lyrics" placeholder="Şarkı sözlerini buraya yaz..."></textarea>

<label class="field-label" for="musicMood">Mood / Tür</label>
<input id="musicMood" class="field-input" type="text" placeholder="Örn: pop, enerjik, Türkçe vokal">

  <button id="mobileMusicGenerateBtn" class="generate-btn" type="button">
    Müzik Üret
  </button>

  <div id="mobileMusicStatus" class="mobile-status"></div>
</section>

<h2 class="section-title">Son müzikler</h2>

<div id="mobileMusicResults" class="empty-card">
  Henüz mobil müzik üretimi başlatılmadı.
</div>
  </main>

<nav class="bottom-nav">
  <a class="active" href="#home">
    <span>🏠</span>
    <b>Ana Sayfa</b>
  </a>
  <a href="#productions">
    <span>🎬</span>
    <b>Üretimler</b>
  </a>
  <a href="#tools">
    <span>✨</span>
    <b>Araçlar</b>
  </a>
  <a href="/fiyatlandirma.html#packs">
    <span>💳</span>
    <b>Krediler</b>
  </a>
</nav>
  <script>
  (function(){
    const btn = document.getElementById("mobileMusicGenerateBtn");
    const titleEl = document.getElementById("musicTitle");
    const promptEl = document.getElementById("musicPrompt");
    const moodEl = document.getElementById("musicMood");
    const statusEl = document.getElementById("mobileMusicStatus");
    const resultsEl = document.getElementById("mobileMusicResults");

    if (!btn || !promptEl || !statusEl || !resultsEl) return;

    btn.addEventListener("click", async function(){
      const title = (titleEl.value || "").trim();
      const prompt = (promptEl.value || "").trim();
      const mood = (moodEl.value || "").trim();

      if (!prompt) {
        statusEl.textContent = "Prompt yazmadan üretim başlatılamaz.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Üretiliyor...";
      statusEl.textContent = "Müzik üretimi başlatılıyor...";

      try {
        const res = await fetch("/api/music/generate", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "accept": "application/json"
          },
          body: JSON.stringify({
            title,
            prompt,
            mood,
            vocal: "Vokalli",
            mode: "vocals"
          })
        });

        const data = await res.json();

        if (!data || data.ok === false) {
          statusEl.textContent = "Üretim başlatılamadı: " + (data && data.error ? data.error : "unknown_error");
          return;
        }

        statusEl.textContent = "Üretim kuyruğa alındı.";
        resultsEl.textContent = "Job ID: " + (data.internal_job_id || data.provider_job_id || "oluşturuldu");
      } catch (err) {
        statusEl.textContent = "Bağlantı hatası: " + String(err && err.message ? err.message : err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Müzik Üret";
      }
    });
  })();
</script>
</body>
</html>
