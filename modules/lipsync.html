<section class="main-panel module-lipsync" data-module="lipsync" data-module-root="lipsync">
  <div class="lipsync-shell">
<div class="lipsync-card">
  <div class="lipsync-dev-notice">
    Bir fotoğraf yükle; konuşma metni yaz veya kendi sesini yükle. AIVO dudak hareketlerini sese göre senkronlar.
  </div>

      <div class="lipsync-grid">
        <section class="lipsync-block lipsync-block--speech">
          <div class="lipsync-block-head">
            <div>
              <div class="lipsync-block-title">Konuşma</div>
              <div class="lipsync-block-sub">Metin yaz veya hazır ses dosyası yükle.</div>
            </div>

            <div class="lipsync-icon-actions">
              <label class="lipsync-icon-btn" title="Ses yükle">
                <input type="file" accept="audio/*" data-lipsync-audio hidden>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 14.5a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 0 0-7 0v5a3.5 3.5 0 0 0 3.5 3.5Z"></path>
                  <path d="M5 10.5a7 7 0 0 0 14 0"></path>
                  <path d="M12 17.5V21"></path>
                  <path d="M8.5 21h7"></path>
                </svg>
              </label>

              <label class="lipsync-icon-btn" title="Metin içe aktar">
                <input type="file" accept=".txt,text/plain" data-lipsync-script-file hidden>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 16V4"></path>
                  <path d="M7 9l5-5 5 5"></path>
                  <path d="M5 20h14"></path>
                </svg>
              </label>
            </div>
          </div>

          <textarea
            class="lipsync-textarea"
            data-lipsync-script
            maxlength="1200"
            placeholder="Ne konuşturmak istiyorsun? Metni buraya yaz..."
          ></textarea>

          <div class="lipsync-meta-row">
            <div class="lipsync-file-note" data-lipsync-audio-name>
              Ses yüklenmedi. Metin yazarsan AIVO sesi kullanılacak.
            </div>

            <div class="lipsync-counter" data-lipsync-counter>0 / 1200</div>
          </div>

          <div class="lipsync-voice-row">
            <button type="button" class="lipsync-pill-btn" data-lipsync-voice="tranquil_tulin">
              🔊 Tranquil Tülin
            </button>

            <button type="button" class="lipsync-pill-btn" data-lipsync-preview-voice>
              ▶ Ön Dinle
            </button>
          </div>
        </section>

        <section class="lipsync-block lipsync-photo-zone">
          <label class="lipsync-photo-label">
            <input type="file" accept="image/*" data-lipsync-photo hidden>

            <div data-lipsync-photo-empty>
              <div class="lipsync-photo-icon lipsync-photo-icon--svg">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="16" rx="3"></rect>
                  <circle cx="8.5" cy="9" r="1.7"></circle>
                  <path d="M6 17l4.2-4.2a1.4 1.4 0 0 1 2 0L15 15.6"></path>
                  <path d="M13.8 14.4l1.4-1.4a1.4 1.4 0 0 1 2 0L21 16.8"></path>
                </svg>
              </div>

              <div class="lipsync-photo-title">Fotoğraf yükle</div>
              <div class="lipsync-photo-text">
                Yüzü net görünen JPG / PNG görsel seç.
              </div>
            </div>

            <img class="lipsync-photo-preview" data-lipsync-photo-preview alt="">
            <div class="lipsync-photo-name" data-lipsync-photo-name></div>
          </label>

          <div class="lipsync-photo-controls">
            <select class="lipsync-select" data-lipsync-resolution>
              <option value="720p">720p</option>
              <option value="1080p" selected>1080p</option>
            </select>

            <button type="button" class="lipsync-settings-btn" data-lipsync-settings>
              ⚙
            </button>
          </div>
        </section>
      </div>

      <section class="lipsync-motion">
        <div class="lipsync-motion-head">
          <div>
            <div class="lipsync-motion-title">Hareket ayarları</div>
            <div class="lipsync-motion-sub">İfade ve mimik kontrolü için hazır alan.</div>
          </div>

          <label class="lipsync-switch-label">
            <input type="checkbox" data-lipsync-expressive checked>
            <span>Daha ifadeli hareket</span>
          </label>
        </div>

        <textarea
          class="lipsync-motion-textarea"
          data-lipsync-motion-prompt
          placeholder="İsteğe bağlı hareket tarifi: sıcak ve samimi konuşsun, hafif gülümsesin..."
        ></textarea>

        <div class="lipsync-preset-row">
          <button type="button" class="lipsync-preset-btn" data-lipsync-preset="Heyecanlı ve enerjik konuşsun.">Heyecanlı</button>
          <button type="button" class="lipsync-preset-btn" data-lipsync-preset="Sıcak ve samimi konuşsun, doğal gülümsesin.">Sıcak & samimi</button>
          <button type="button" class="lipsync-preset-btn" data-lipsync-preset="Sakin, dengeli ve kontrollü konuşsun.">Sakin</button>
          <button type="button" class="lipsync-preset-btn" data-lipsync-preset="Düşünceli, içten ve yumuşak ifade kullansın.">Düşünceli</button>
        </div>
      </section>

      <footer class="lipsync-footer">
        <button type="button" class="lipsync-generate-btn" data-lipsync-generate>
          Dudak Senkron Video Üret
        </button>
      </footer>
    </div>
  </div>
</section>
