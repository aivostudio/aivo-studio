<!-- FILE: cover.module.html (COVER MODULE / FULL BLOCK) -->
<section class="main-panel" data-module="cover">

  <!-- ================= COVER MODULE ================= -->

  <div class="cover-view is-active" data-cover-view="root">

    <!-- HERO -->
    <div class="card page-hero-card has-gradient">
      <div class="page-hero-inner">
        <div class="page-title">Kapak / Görsel Üret</div>
        <div class="page-subtitle">
          Spotify, Apple Music ve YouTube için kapaklarını AI ile tasarla.
        </div>
      </div>
    </div>

    <!-- GRID -->
    <div class="cover-grid">

    <!-- SOL: FORM -->
<div class="card cover-left">
  <div class="card-header">
    <span class="badge-beta">BETA</span>
  </div>

  <div class="form-grid cover-form-grid">

    <div class="form-field full">
      <label for="coverPrompt">Prompt</label>
    <textarea
  id="coverPrompt"
  rows="4"
  maxlength="1000"
  placeholder="Prompt buraya yazılacak..."></textarea>
      <div class="prompt-count" id="coverPromptCount">0 / 1000</div>
 </div>

    <div class="form-field full cover-meta-fields">
  <div class="cover-field">
    <label for="coverArtist">Artist</label>
    <input
      id="coverArtist"
      name="artist"
      type="text"
      placeholder="Sanatçı adı"
      maxlength="80"
    />
  </div>

  <div class="cover-field">
    <label for="coverTitle">Title</label>
    <input
      id="coverTitle"
      name="title"
      type="text"
      placeholder="Şarkı / Albüm adı"
      maxlength="120"
    />
  </div>
</div>

          <!-- KALİTE SEVİYESİ (PROMPT ALTINDA / KOMPAKT / SADE) -->
          <div class="form-field full">
            <label>Kalite Seviyesi</label>

            <div class="quality-pills" role="radiogroup" aria-label="Kalite Seviyesi">

              <!-- Artist (Default) -->
              <button
                class="quality-pill is-active"
                type="button"
                data-quality="artist"
                data-credit-cost="6"
                data-model="fal-ai/flux-2-pro">
                <span class="qp-left">
                  <span class="qp-ico">🎨</span>
                  <span class="qp-title">Artist</span>
                </span>
                <span class="qp-right">
                  <span class="qp-credit">6 Kredi</span>
                </span>
              </button>

              <!-- Cinematic Ultra HD -->
             <!-- Cinematic Ultra HD -->
<button
  class="quality-pill is-ultra"
  type="button"
  data-quality="ultra"
  data-credit-cost="9"
  data-model="fal-ai/flux-pro/v1.1-ultra">

  <span class="qp-left">
    <span class="qp-ico">🚀</span>
    <span class="qp-title">Cinematic Ultra HD</span>
  </span>

  <span class="qp-right">
    <span class="qp-credit">9 Kredi</span>
  </span>

</button>



            </div>
          </div>
          <!-- /KALİTE SEVİYESİ -->

          <!-- STİL KARTLARI -->
          <div class="form-field full">
            <label>Stil Seçenekleri</label>

            <div class="cover-style-cards">

              <button class="style-card" type="button"
                data-style="Gerçekçi"
                data-prompt="Spotify albüm kapağı, gerçekçi portre, stüdyo ışığı, premium, keskin detay, 1:1">
                <span class="style-card-ico">📸</span>
                <span class="style-card-text">
                  <span class="style-card-title">Gerçekçi</span>
                  <span class="style-card-sub">Stüdyo ışığında net, doğal ve yüksek detaylı kapaklar</span>
                </span>
              </button>

              <button class="style-card" type="button"
                data-style="Sanatsal"
                data-prompt="Sanatsal albüm kapağı, yağlı boya dokusu, dramatik ışık, derin renkler, 1:1">
                <span class="style-card-ico">🎨</span>
                <span class="style-card-text">
                  <span class="style-card-title">Sanatsal</span>
                  <span class="style-card-sub">Doku, ışık ve derin renklerle “eser” hissi veren kompozisyonlar</span>
                </span>
              </button>

              <button class="style-card" type="button"
                data-style="Çizgi Film"
                data-prompt="Çizgi film albüm kapağı, canlı renkler, kalın kontur, eğlenceli karakter stili, 1:1">
                <span class="style-card-ico">🧸</span>
                <span class="style-card-text">
                  <span class="style-card-title">Çizgi Film</span>
                  <span class="style-card-sub">Temiz hatlar, canlı tonlar ve karakter odaklı eğlenceli stil</span>
                </span>
              </button>

              <button class="style-card" type="button"
                data-style="Soyut"
                data-prompt="Soyut albüm kapağı, geometrik şekiller, yumuşak geçişler, modern tasarım, 1:1">
                <span class="style-card-ico">🫧</span>
                <span class="style-card-text">
                  <span class="style-card-title">Soyut</span>
                  <span class="style-card-sub">Geometrik formlar ve yumuşak geçişlerle modern konsept tasarım</span>
                </span>
              </button>

              <button class="style-card" type="button"
                data-style="Fotoğrafik"
                data-prompt="Fotoğrafik albüm kapağı, sinematik ışık, alan derinliği, premium fotoğraf estetiği, 1:1">
                <span class="style-card-ico">📷</span>
                <span class="style-card-text">
                  <span class="style-card-title">Fotoğrafik</span>
                  <span class="style-card-sub">Sinematik ışık, alan derinliği ve premium fotoğraf estetiği</span>
                </span>
              </button>

              <button class="style-card" type="button"
                data-style="Anime"
                data-prompt="Anime albüm kapağı, japon manga stili, yumuşak ışık, temiz hatlar, 1:1">
                <span class="style-card-ico">🌸</span>
                <span class="style-card-text">
                  <span class="style-card-title">Anime</span>
                  <span class="style-card-sub">Manga dokusu, yumuşak ışık ve temiz çizgilerle anime dili</span>
                </span>
              </button>

            </div>
          </div>
          <!-- /STİL KARTLARI -->

          <div class="form-field">
            <label>Görüntü Sayısı</label>
            <select class="select" id="coverCount">
              <option value="1">1 Görüntü</option>
              <option value="2">2 Görüntü</option>
              <option value="4">4 Görüntü</option>
            </select>
          </div>

          <div class="form-field">
            <label>En / Boy Oranı</label>
            <select class="select" id="coverRatio">
              <option value="1:1">Kare (1:1)</option>
              <option value="9:16">Dikey (9:16)</option>
              <option value="16:9">Yatay (16:9)</option>
            </select>
          </div>

          <div class="form-field full advanced-box">
            <div class="advanced-header">
              <span>AIVO Kapak Motoru</span>
              <span class="advanced-credit">Gerekli Kredi: <strong>6</strong></span>
            </div>
            <p class="advanced-desc">
              6 kredi ile 1 kapak üretilir. Kalite artırımı daha fazla kredi tüketebilir.
            </p>
          </div>

          <div class="form-field full">
            <button
              class="primary-btn full-width"
              id="coverGenerateBtn"
              type="button"
              data-generate="cover"
              data-credit-cost="6">
              🖼️ Kapak Üret (6 Kredi)
            </button>
          </div>

        </div>
      </div>
      <!-- /SOL -->

    </div>
    <!-- /GRID -->

  </div>

  <!-- ================= /COVER MODULE ================= -->

</section>
