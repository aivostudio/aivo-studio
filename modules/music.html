<section class="main-panel musicPage" data-module="music">

  <!-- ================= MUSIC MODULE ================= -->

  <!-- ****** GELENEKSEL VIEW ****** -->
  <div class="music-view" data-music-view="geleneksel">

    <!-- HEADER -->
    <div class="panel-header">
      <div class="page-head">
        <div class="page-head__box">
          <h1 class="page-head__title">AI Müzik Üret</h1>
          <p class="page-head__sub">
            Ritim, vokal, mood ve tür seç — AIVO şarkıyı senin için oluştursun.
          </p>
        </div>
      </div>
    </div>

    <!-- ÇALIŞMA MODU -->
    <div class="card" data-ui="workmode">
      <div class="card-header">
        <div>
          <div class="card-title">Çalışma Modu</div>
          <div class="card-subtitle">
            Hızlı başlangıç için Basit Mod, detaylı kontrol için Gelişmiş Mod.
          </div>
        </div>
      </div>

      <div class="card-body">
        <div class="mode-toggle">
          <button class="mode-btn" type="button" data-mode-button="basic">
            Basit Mod
          </button>
          <button class="mode-btn" type="button" data-mode-button="advanced">
            Gelişmiş Mod <span class="mode-star">✦</span>
          </button>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="card">
      <div class="form-grid">

        <!-- 1) ŞARKI ADI (FULL WIDTH) -->
        <div class="form-field full">
          <label for="songName">Şarkı Adı</label>
          <input type="text"
                 id="songName"
                 placeholder="Örn: Kül Bahçesi, Midnight Drive..." />
        </div>

        <!-- 2) PROMPT (SOL / HALF) -->
        <div class="form-field half">
          <label for="prompt">Ek Açıklama / Prompt</label>

          <textarea id="prompt"
                    rows="6"
                    maxlength="500"
                    placeholder="Müzikte özellikle vurgulamak istediğin detayları yaz..."></textarea>

          <div class="char-counter"
               data-counter-for="prompt">
            0 / 500
          </div>
        </div>

        <!-- 2) LYRICS (SAĞ / HALF) - SADECE ADVANCED -->
        <div class="form-field half" data-visible-in="advanced">
          <label for="lyrics">Şarkı Sözleri (isteğe bağlı)</label>

          <textarea id="lyrics"
                    rows="6"
                    maxlength="5000"
                    placeholder="Şarkı sözlerini buraya yazın..."></textarea>

          <div class="char-counter"
               data-counter-for="lyrics">
            0 / 5000
          </div>
        </div>

        <!-- 3) UPLOAD (SOL / HALF) -->
        <div class="form-field half">
          <label>Referans Ses Yükle (opsiyonel)</label>

          <input type="file" id="refAudio" accept=".mp3,.wav,.m4a" hidden />

          <label class="upload-box" for="refAudio">
            <div>
              <strong>Ses dosyası seç veya sürükleyip bırak</strong><br />
              <span class="upload-hint">MP3, WAV, M4A — maksimum 10MB</span>
            </div>
          </label>
        </div>

     <!-- 4) RECORD (SAĞ / HALF) - SADECE ADVANCED -->
<div class="form-field half" data-visible-in="advanced">
  <label>Record</label>

  <!-- Record trigger -->
  <button
    class="upload-box"
    type="button"
    id="musicRecordBtn"
    aria-haspopup="dialog"
    aria-controls="musicRecordModal"
  >
    <div>
      <strong>🎙️ Record</strong><br />
      <span class="upload-hint">Tıkla ve kayda başla</span>
    </div>
  </button>

  <!-- Recorded preview (JS dolduracak) -->
  <div class="record-preview" id="musicRecordPreview" hidden>
    <audio id="musicRecordAudio" controls></audio>
    <input type="hidden" id="musicRecordBlobUrl" value="" />
  </div>
</div>

<!-- RECORD MODAL (Suno gibi) - JS aç/kapatacak -->
<div class="modal" id="musicRecordModal" role="dialog" aria-modal="true" aria-hidden="true" hidden>
  <div class="modal__backdrop" data-close="musicRecordModal"></div>

  <div class="modal__panel" role="document">
    <div class="modal__head">
      <div class="modal__title" id="musicRecordTitle">Recording</div>
      <button class="modal__close" type="button" data-close="musicRecordModal" aria-label="Close">✕</button>
    </div>

    <div class="modal__body">
      <div class="rec-timer" id="musicRecTimer">00:00</div>

      <!-- dalga alanı (JS çizdirir / sonra canvas koyarız) -->
      <div class="rec-wave" id="musicRecWave"></div>

      <!-- Record button -->
      <button class="rec-bigbtn" type="button" id="musicRecToggleBtn" aria-pressed="false">
        ●
      </button>
    </div>

    <div class="modal__foot">
      <button class="btn" type="button" id="musicRecStartOverBtn">Start Over</button>
      <button class="btn btn-primary" type="button" id="musicRecSaveBtn">Save</button>
    </div>
  </div>
</div>

          <!-- Coming soon / disabled UI -->
          <div class="upload-box is-disabled" aria-disabled="true">
            <div>
              <strong>🎙️ Record</strong><br />
              <span class="upload-hint">Coming soon</span>
            </div>
          </div>
        </div>

        <!-- 5) MOOD + VOCAL (EN ALT / 2 KOLON) -->
        <div class="form-field half" data-visible-in="advanced">
          <label for="mood">Ruh Hali (Mood)</label>
          <select id="mood">
            <option value="">Ruh halini seç</option>
            <option>Enerjik</option>
            <option>Hüzünlü</option>
            <option>Romantik</option>
            <option>Sakin</option>
            <option>Epik</option>
          </select>
        </div>

        <div class="form-field half" data-visible-in="advanced">
          <label for="vocalType">Vokal Tipi</label>
          <select id="vocalType">
            <option value="">Vokal tipini seç</option>
            <option>Erkek Vokal (AI)</option>
            <option>Kadın Vokal (AI)</option>
            <option>Soft / Çocuk Vokal (AI)</option>
            <option>Enstrümantal (Vokalsiz)</option>
          </select>
        </div>

      </div>
    </div>

    <!-- GENERATE -->
    <div class="card">
      <div class="form-field full">
        <button class="primary-btn aivoBtnPrimary"
                id="musicGenerateBtn"
                type="button"
                data-generate="music"
                data-credit-cost="5">
          🎵 Müzik Üret <span class="credit-mini">(5 Kredi)</span>
        </button>
      </div>
    </div>

  </div>
  <!-- ****** /GELENEKSEL VIEW ****** -->

</section>
