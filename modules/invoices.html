<!-- MODULE: INVOICES (v2) -->
<section class="main-panel" data-page="invoices" data-module="invoices">

  <div class="panel-header">
    <div class="page-head">
      <div class="page-head__box">
        <h1 class="page-head__title">Faturalarım</h1>
        <p class="page-head__sub">
          Geçmiş satın alımlarına ait faturalar ve ödeme belgeleri burada listelenir.
        </p>
      </div>
    </div>

   <div class="invoices-actions" style="margin-top:12px;">
  <button class="chip-btn is-active" type="button" data-invoices-filter="all" aria-pressed="true">Tümü</button>
  <button class="chip-btn" type="button" data-invoices-filter="purchase" aria-pressed="false">Satın Alım</button>
  <button class="chip-btn" type="button" data-invoices-filter="refund" aria-pressed="false">İade</button>
</div>
  </div>

  <section class="invoices-list invoices-list--flat" aria-label="Fatura listesi">

    <div class="invoices-empty" data-invoices-empty hidden>
      Henüz fatura kaydın yok. Kredi satın aldığında burada görünecek.
    </div>

    <div class="invoices-cards" data-invoices-cards></div>

    <div class="invoices-more">
      <button class="chip-btn" type="button" data-invoices-more hidden>
        Daha fazla yükle
      </button>
    </div>

  </section>

</section>
