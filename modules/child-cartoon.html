<section class="main-panel" data-module="cartoon">

  <!-- ================ CHILD CARTOON MODULE ================ -->

  <div class="smpack-view is-active" data-cartoon-view="root">

    <!-- HEADER -->
    <div class="panel-header">
      <div class="cartoon-hero">
        <div class="cartoon-hero__box">
          <h1 class="cartoon-hero__title">AI Çocuk Çizgifilm</h1>
          <p class="cartoon-hero__sub">
            Preset karakterlerle kısa çizgifilm sahneleri üret.
          </p>
        </div>
      </div>
    </div>

    <!-- MODE SWITCH -->
    <div class="cartoon-mode-shell" data-cartoon-mode-shell>
      <div class="cartoon-mode-switch" role="tablist" aria-label="Mod Seçimi">
        <button
          type="button"
          class="cartoon-mode-tab"
          role="tab"
          aria-selected="false"
          data-cartoon-mode="character">
          Karakter Yarat
        </button>

        <button
          type="button"
          class="cartoon-mode-tab is-active"
          role="tab"
          aria-selected="true"
          data-cartoon-mode="basic">
          Basit Mod
        </button>

        <button
          type="button"
          class="cartoon-mode-tab"
          role="tab"
          aria-selected="false"
          data-cartoon-mode="story">
          Hikaye Modu ✨
        </button>
      </div>
    </div>

    <!-- CHARACTER MODE -->
    <div class="cartoon-mode-view" data-cartoon-view="character" hidden>

      <section class="cartoon-block cartoon-block--compact">
        <div class="cartoon-block-head">
          <h3>Karakter Yarat</h3>
        </div>

        <div class="cartoon-field cartoon-field--full">
          <label class="cartoon-field-label" for="cartoon-character-desc">Kısa Tanım</label>
          <textarea
            id="cartoon-character-desc"
            class="cartoon-prompt-input"
            rows="4"
            maxlength="300"
            placeholder="Örn: sarı yağmurluklu sevimli küçük tavşan"
            data-character-desc></textarea>
        </div>

        <div
          class="cartoon-form-grid-3"
          style="display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; margin-top:16px;">
          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-type">Tür</label>
            <select id="cartoon-character-type" class="cartoon-select" data-character-type>
              <option value="animal" selected>Hayvan</option>
              <option value="human">İnsan</option>
              <option value="fantasy">Fantastik</option>
              <option value="object">Nesne</option>
              <option value="custom">Serbest</option>
            </select>
          </div>

          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-name">Karakter Adı</label>
            <input
              id="cartoon-character-name"
              class="cartoon-select"
              type="text"
              placeholder="Örn: Mini Tavşan"
              data-character-name>
          </div>

          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-style">Stil</label>
            <select id="cartoon-character-style" class="cartoon-select" data-character-style>
              <option value="cute-3d" selected>Sevimli 3D</option>
              <option value="soft-cartoon">Yumuşak Çizgifilm</option>
              <option value="pastel">Pastel</option>
              <option value="bright-kids">Parlak Çocuk Stili</option>
            </select>
          </div>
        </div>

        <div class="cartoon-field cartoon-field--full" style="margin-top:16px;">
          <label class="cartoon-field-label">Referans Görsel</label>
          <label class="cartoon-upload-row">
            <input type="file" accept="image/*" hidden data-character-create-upload>
            <span class="cartoon-upload-btn">Resim Seç</span>
            <span class="cartoon-upload-text">Dosya seçilmedi</span>
          </label>
        </div>
      </section>

      <section class="cartoon-block cartoon-block--compact">
        <div class="cartoon-block-head">
          <h3>Karakterlerim</h3>
        </div>

        <div
          class="cartoon-character-mini-grid"
          data-character-library
          style="max-height: 280px; overflow-y: auto; overflow-x: hidden;">
          <button type="button" class="cartoon-character-mini-card is-empty" disabled>
            Henüz karakter yok
          </button>
        </div>
      </section>

      <section class="cartoon-block cartoon-block--compact">
        <div class="cartoon-block-head">
          <h3>Gelişmiş Özelleştirme</h3>
        </div>

        <div class="cartoon-form-grid-2 cartoon-form-grid-2--with-audio">
          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-hair-type">Saç Tipi</label>
            <select id="cartoon-character-hair-type" class="cartoon-select" data-character-hair-type>
              <option value="" selected>Seçiniz</option>
              <option value="short">Kısa</option>
              <option value="long">Uzun</option>
              <option value="curly">Kıvırcık</option>
              <option value="wavy">Dalgalı</option>
              <option value="straight">Düz</option>
            </select>
          </div>

          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-hair-color">Saç Rengi</label>
            <select id="cartoon-character-hair-color" class="cartoon-select" data-character-hair-color>
              <option value="" selected>Seçiniz</option>
              <option value="black">Siyah</option>
              <option value="brown">Kahverengi</option>
              <option value="blonde">Sarı</option>
              <option value="red">Kızıl</option>
              <option value="pink">Pembe</option>
              <option value="blue">Mavi</option>
            </select>
          </div>

          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-outfit">Kıyafet</label>
            <select id="cartoon-character-outfit" class="cartoon-select" data-character-outfit>
              <option value="" selected>Seçiniz</option>
              <option value="dress">Elbise</option>
              <option value="tshirt-shorts">Tişört + Şort</option>
              <option value="hoodie">Kapüşonlu</option>
              <option value="superhero">Süper Kahraman</option>
              <option value="princess">Prenses</option>
              <option value="school">Okul Kıyafeti</option>
            </select>
          </div>

          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-glasses">Gözlük</label>
            <select id="cartoon-character-glasses" class="cartoon-select" data-character-glasses>
              <option value="" selected>Yok</option>
              <option value="round">Yuvarlak</option>
              <option value="square">Kare</option>
              <option value="star">Yıldız</option>
              <option value="heart">Kalp</option>
            </select>
          </div>

          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-accessory">Aksesuar</label>
            <select id="cartoon-character-accessory" class="cartoon-select" data-character-accessory>
              <option value="" selected>Yok</option>
              <option value="hat">Şapka</option>
              <option value="bow">Fiyonk</option>
              <option value="bag">Çanta</option>
              <option value="wand">Sihirli Değnek</option>
              <option value="crown">Taç</option>
            </select>
          </div>

          <div class="cartoon-field">
            <label class="cartoon-field-label" for="cartoon-character-expression">Yüz İfadesi</label>
            <select id="cartoon-character-expression" class="cartoon-select" data-character-expression>
              <option value="" selected>Seçiniz</option>
              <option value="happy">Mutlu</option>
              <option value="excited">Heyecanlı</option>
              <option value="cute">Sevimli</option>
              <option value="calm">Sakin</option>
              <option value="funny">Komik</option>
            </select>
          </div>

         
        </div>
      </section>

      <section class="cartoon-block cartoon-block--compact cartoon-block--cta-only">
        <div class="cartoon-cta">
          <button
            type="button"
            class="cartoon-generate-btn"
            data-character-generate
            data-cartoon-character-create>
            🧩 Karakter Oluştur
          </button>
        </div>
      </section>
    </div>

    <!-- BASIC MODE -->
    <div class="cartoon-mode-view" data-cartoon-view="basic">
      <!-- Ek Prompt -->
      <section class="cartoon-block">
        <div class="cartoon-block-head">
          <h3>Ek Prompt</h3>
        </div>

        <label class="cartoon-prompt-wrap" for="cartoonExtraPrompt">
          <textarea
            id="cartoonExtraPrompt"
            class="cartoon-prompt-input"
            name="cartoonExtraPrompt"
            rows="3"
            maxlength="1000"
            data-cartoon-prompt-input
            placeholder="Örn: mutlu görünsün, baloncuk olsun, yavaş hareket etsin"></textarea>

          <div class="cartoon-prompt-meta">
            <span class="cartoon-prompt-count" data-cartoon-prompt-count>0 / 1000</span>
          </div>
        </label>
      </section>

      <!-- BODY -->
      <div class="cartoon-layout">

        <!-- LEFT / FORM -->
        <div class="cartoon-left">
          <div class="cartoon-form">

            <div class="cartoon-character-duo">
              <!-- Ana Karakter -->
              <section class="cartoon-block">
                <div class="cartoon-block-head">
                  <h3>Ana Karakter</h3>
                </div>

                <div class="cartoon-character-grid cartoon-character-grid--stack">
                  <button type="button" class="cartoon-character-card is-selected" data-role="main" data-character="red-fish">
                    <span class="cartoon-character-thumb">🐟</span>
                    <span class="cartoon-character-name">Kırmızı Balık</span>
                  </button>

                  <button type="button" class="cartoon-character-card" data-role="main" data-character="chick">
                    <span class="cartoon-character-thumb">🐥</span>
                    <span class="cartoon-character-name">Civciv</span>
                  </button>

                  <button type="button" class="cartoon-character-card" data-role="main" data-character="duck">
                    <span class="cartoon-character-thumb">🦆</span>
                    <span class="cartoon-character-name">Ördek</span>
                  </button>
                </div>
              </section>

              <!-- Yardımcı Karakterler -->
              <section class="cartoon-block">
                <div class="cartoon-block-head">
                  <h3>Yardımcı Karakterler</h3>
                  <span class="cartoon-count" data-helper-count>0/3</span>
                </div>

                <div class="cartoon-character-grid cartoon-character-grid--stack">
                  <button type="button" class="cartoon-character-card" data-role="helper" data-character="small-fish-school">
                    <span class="cartoon-character-thumb">🐠</span>
                    <span class="cartoon-character-name">Küçük Balıklar</span>
                  </button>

                  <button type="button" class="cartoon-character-card" data-role="helper" data-character="frog">
                    <span class="cartoon-character-thumb">🐸</span>
                    <span class="cartoon-character-name">Kurbağa</span>
                  </button>

                  <button type="button" class="cartoon-character-card" data-role="helper" data-character="crab">
                    <span class="cartoon-character-thumb">🦀</span>
                    <span class="cartoon-character-name">Yengeç</span>
                  </button>
                </div>
              </section>
            </div>

            <!-- Sahne -->
            <section class="cartoon-block">
              <div class="cartoon-block-head">
                <h3>Sahne</h3>
              </div>

              <div class="cartoon-scene-grid">
                <button type="button" class="cartoon-mini-card is-selected" data-scene="underwater">Deniz Altı</button>
                <button type="button" class="cartoon-mini-card" data-scene="pond">Gölet</button>
                <button type="button" class="cartoon-mini-card" data-scene="forest">Orman</button>
                <button type="button" class="cartoon-mini-card" data-scene="farm">Çiftlik</button>
                <button type="button" class="cartoon-mini-card" data-scene="sky">Gökyüzü</button>
                <button type="button" class="cartoon-mini-card" data-scene="beach">Plaj</button>
              </div>
            </section>

            <!-- Aksiyon -->
            <section class="cartoon-block">
              <div class="cartoon-block-head">
                <h3>Aksiyon</h3>
              </div>

              <div class="cartoon-pill-group">
                <button type="button" class="cartoon-pill is-selected" data-action="swimming">Yüzüyor</button>
                <button type="button" class="cartoon-pill" data-action="jumping">Zıplıyor</button>
                <button type="button" class="cartoon-pill" data-action="playing">Oynuyor</button>
                <button type="button" class="cartoon-pill" data-action="laughing">Gülüyor</button>
                <button type="button" class="cartoon-pill" data-action="dancing">Dans Ediyor</button>
                <button type="button" class="cartoon-pill" data-action="waving">El Sallıyor</button>
                <button type="button" class="cartoon-pill" data-action="moving-slowly">Yavaş İlerliyor</button>
                <button type="button" class="cartoon-pill" data-action="running">Koşuyor</button>
              </div>
            </section>

            <!-- Kişiselleştirme -->
            <section class="cartoon-block cartoon-block--compact">
              <div class="cartoon-block-head">
                <h3>Kişiselleştirme <span class="cartoon-muted">(opsiyonel)</span></h3>
              </div>

              <div class="cartoon-form-grid-2 cartoon-form-grid-2--with-audio">
                <div class="cartoon-field">
                  <label class="cartoon-field-label" for="cartoon-duration">Süre</label>
                  <select id="cartoon-duration" class="cartoon-select">
                    <option value="5" selected>5 Saniye</option>
                    <option value="10">10 Saniye</option>
                    <option value="15">15 Saniye</option>
                  </select>
                </div>

                <div class="cartoon-field">
                  <label class="cartoon-field-label" for="cartoon-ratio">En / Boy Oranı</label>
                  <select id="cartoon-ratio" class="cartoon-select">
                    <option value="16:9" selected>Geniş (16:9)</option>
                    <option value="1:1">Kare (1:1)</option>
                    <option value="9:16">Dikey (9:16)</option>
                  </select>
                </div>

                <div class="cartoon-field cartoon-field--audio">
                  <div class="cartoon-field-label">Ses Üretimi</div>
                  <label class="cartoon-audio-toggle">
                    <span class="cartoon-audio-toggle-text">Aç / Kapat</span>
                    <label class="cartoon-switch">
                      <input type="checkbox" data-audio-enabled>
                      <span class="cartoon-switch-ui"></span>
                    </label>
                  </label>
                </div>

                <div class="cartoon-field cartoon-field--full">
                  <label class="cartoon-field-label">Kendi Karakterini Koy</label>
                  <label class="cartoon-upload-row">
                    <input type="file" accept="image/*" hidden data-character-upload>
                    <span class="cartoon-upload-btn">Resim Seç</span>
                    <span class="cartoon-upload-text">Dosya seçilmedi</span>
                  </label>
                </div>
              </div>
            </section>

            <!-- CTA -->
            <div class="cartoon-cta">
              <button type="button" class="cartoon-generate-btn" data-cartoon-generate>
                🎬 Sahneyi Oluştur (50 Kredi)
              </button>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>
</section>
