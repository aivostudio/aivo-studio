<section class="main-panel" data-module="cartoon">

  <!-- ================ CHILD CARTOON MODULE ================ -->

  <div class="smpack-view is-active" data-cartoon-view="root">

    <!-- HEADER -->
    <div class="panel-header">
      <div class="page-head">
        <div>
          <h1>AI Çocuk Çizgifilm</h1>
          <p>Preset karakterlerle kısa çizgifilm sahneleri üret.</p>
        </div>
      </div>
    </div>
<!-- Ek Prompt -->
<section class="cartoon-block">
  <div class="cartoon-block-head">
    <h3>Ek Prompt</h3>
  </div>

  <label class="cartoon-prompt-wrap" for="cartoonExtraPrompt">
    <textarea
      id="cartoonExtraPrompt"
      class="cartoon-prompt-input"
      name="cartoonExtraPrompt"
      rows="3"
      maxlength="1000"
      data-cartoon-prompt-input
      placeholder="Örn: mutlu görünsün, baloncuk olsun, yavaş hareket etsin"></textarea>

    <div class="cartoon-prompt-meta">
      <span class="cartoon-prompt-count" data-cartoon-prompt-count>0 / 1000</span>
    </div>
  </label>
</section>
    <!-- BODY -->
    <div class="cartoon-layout">

      <!-- LEFT / FORM -->
      <div class="cartoon-left">
        <div class="cartoon-form">
          
<div class="cartoon-character-duo">
  <!-- Ana Karakter -->
  <section class="cartoon-block">
    <div class="cartoon-block-head">
      <h3>Ana Karakter</h3>
    </div>

    <div class="cartoon-character-grid cartoon-character-grid--stack">
      <button type="button" class="cartoon-character-card is-selected" data-role="main" data-character="red-fish">
        <span class="cartoon-character-thumb">🐟</span>
        <span class="cartoon-character-name">Kırmızı Balık</span>
      </button>

      <button type="button" class="cartoon-character-card" data-role="main" data-character="chick">
        <span class="cartoon-character-thumb">🐥</span>
        <span class="cartoon-character-name">Civciv</span>
      </button>

      <button type="button" class="cartoon-character-card" data-role="main" data-character="duck">
        <span class="cartoon-character-thumb">🦆</span>
        <span class="cartoon-character-name">Ördek</span>
      </button>
    </div>
  </section>

  <!-- Yardımcı Karakterler -->
  <section class="cartoon-block">
    <div class="cartoon-block-head">
      <h3>Yardımcı Karakterler</h3>
      <span class="cartoon-count" data-helper-count>0/3</span>
    </div>

    <div class="cartoon-character-grid cartoon-character-grid--stack">
      <button type="button" class="cartoon-character-card" data-role="helper" data-character="small-fish-school">
        <span class="cartoon-character-thumb">🐠</span>
        <span class="cartoon-character-name">Küçük Balıklar</span>
      </button>

      <button type="button" class="cartoon-character-card" data-role="helper" data-character="frog">
        <span class="cartoon-character-thumb">🐸</span>
        <span class="cartoon-character-name">Kurbağa</span>
      </button>

      <button type="button" class="cartoon-character-card" data-role="helper" data-character="crab">
        <span class="cartoon-character-thumb">🦀</span>
        <span class="cartoon-character-name">Yengeç</span>
      </button>
    </div>
  </section>
</div>
          <!-- Sahne -->
          <section class="cartoon-block">
            <div class="cartoon-block-head">
              <h3>Sahne</h3>
            </div>

            <div class="cartoon-scene-grid">
              <button type="button" class="cartoon-mini-card is-selected" data-scene="underwater">Deniz Altı</button>
              <button type="button" class="cartoon-mini-card" data-scene="pond">Gölet</button>
              <button type="button" class="cartoon-mini-card" data-scene="forest">Orman</button>
              <button type="button" class="cartoon-mini-card" data-scene="farm">Çiftlik</button>
              <button type="button" class="cartoon-mini-card" data-scene="sky">Gökyüzü</button>
              <button type="button" class="cartoon-mini-card" data-scene="beach">Plaj</button>
            </div>
          </section>

          <!-- Aksiyon -->
          <section class="cartoon-block">
            <div class="cartoon-block-head">
              <h3>Aksiyon</h3>
            </div>

          <div class="cartoon-pill-group">
  <button type="button" class="cartoon-pill is-selected" data-action="swimming">Yüzüyor</button>
  <button type="button" class="cartoon-pill" data-action="jumping">Zıplıyor</button>
  <button type="button" class="cartoon-pill" data-action="playing">Oynuyor</button>
  <button type="button" class="cartoon-pill" data-action="laughing">Gülüyor</button>
  <button type="button" class="cartoon-pill" data-action="dancing">Dans Ediyor</button>
  <button type="button" class="cartoon-pill" data-action="waving">El Sallıyor</button>
  <button type="button" class="cartoon-pill" data-action="moving-slowly">Yavaş İlerliyor</button>
  <button type="button" class="cartoon-pill" data-action="running">Koşuyor</button>
</div>
          </section>
<!-- Kişiselleştirme -->
<section class="cartoon-block cartoon-block--compact">
  <div class="cartoon-block-head">
    <h3>Kişiselleştirme <span class="cartoon-muted">(opsiyonel)</span></h3>
  </div>

  <div class="cartoon-form-grid-2 cartoon-form-grid-2--with-audio">
    <div class="cartoon-field">
      <label class="cartoon-field-label" for="cartoon-duration">Süre</label>
      <select id="cartoon-duration" class="cartoon-select">
        <option value="5" selected>5 Saniye</option>
        <option value="10">10 Saniye</option>
        <option value="15">15 Saniye</option>
      </select>
    </div>

    <div class="cartoon-field">
      <label class="cartoon-field-label" for="cartoon-ratio">En / Boy Oranı</label>
      <select id="cartoon-ratio" class="cartoon-select">
        <option value="16:9" selected>Geniş (16:9)</option>
        <option value="1:1">Kare (1:1)</option>
        <option value="9:16">Dikey (9:16)</option>
      </select>
    </div>

    <div class="cartoon-field cartoon-field--audio">
      <div class="cartoon-field-label">Ses Üretimi</div>
      <label class="cartoon-audio-toggle">
        <span class="cartoon-audio-toggle-text">Aç / Kapat</span>
        <label class="cartoon-switch">
          <input type="checkbox" data-audio-enabled>
          <span class="cartoon-switch-ui"></span>
        </label>
      </label>
    </div>

    <div class="cartoon-field cartoon-field--full">
      <label class="cartoon-field-label">Kendi Karakterini Koy</label>
      <label class="cartoon-upload-row">
        <input type="file" accept="image/*" hidden data-character-upload>
        <span class="cartoon-upload-btn">Resim Seç</span>
        <span class="cartoon-upload-text">Dosya seçilmedi</span>
      </label>
    </div>
  </div>
</section>
<!-- Özet -->
<div class="cartoon-summary" data-cartoon-summary>
  5 sn • 1 ana karakter • 0 yardımcı • X kredi
</div>

<!-- CTA -->
<div class="cartoon-cta">
  <button type="button" class="cartoon-generate-btn" data-cartoon-generate>
    Sahneyi Oluştur
  </button>
</div>

      </div>
    </div>
  </div>
</section>
